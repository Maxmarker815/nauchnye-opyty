<!doctype html>
<html lang="ru"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Научные опыты для детей</title>
<style>

:root{--bg:#f6f8fb;--card:#ffffff;--accent:#2f8fdd;--accent2:#37b6a3;--text:#1f2937;--muted:#6b7280;--border:#e5e7eb;}
*{box-sizing:border-box;}
body{margin:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;background:var(--bg);color:var(--text);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;}
header{background:linear-gradient(135deg,#2f8fdd,#37b6a3);color:#fff;padding:32px 20px;text-align:center;}
header h1{margin:0 0 8px;font-size:28px;}
header p{margin:0;opacity:.9;}
.container{max-width:1100px;margin:0 auto;padding:24px 16px 60px;}
.filters{display:flex;gap:8px;flex-wrap:wrap;margin:20px 0;justify-content:center;}
.filters button{border:1px solid var(--border);background:#fff;padding:8px 16px;border-radius:20px;cursor:pointer;font-size:14px;color:var(--text);}
.filters button.active{background:var(--accent);color:#fff;border-color:var(--accent);}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:16px;}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:16px;text-decoration:none;color:var(--text);transition:.15s;display:flex;flex-direction:column;gap:6px;}
.card:hover{box-shadow:0 6px 18px rgba(0,0,0,.08);transform:translateY(-2px);}
.card .num{font-size:12px;color:var(--muted);}
.card h3{margin:0;font-size:17px;line-height:1.3;}
.card .zh{font-size:13px;color:var(--muted);}
.badge{display:inline-block;font-size:11px;padding:2px 8px;border-radius:10px;background:#fde68a;color:#92400e;width:fit-content;}
.badge.ok{background:#d1fae5;color:#065f46;}
.top-actions{text-align:center;margin:20px 0;}
.top-actions a{color:var(--accent);text-decoration:none;font-size:14px;}
.item-page{background:#fbfcfe;}
.item-page .container{max-width:680px;}
.item-page h1{font-size:27px;margin:6px 0 22px;font-weight:700;letter-spacing:-.01em;color:#222b38;}
.item-page .zh-title{color:var(--muted);margin-top:0;}
.section-block{background:transparent;border:none;border-radius:0;padding:0;margin-bottom:30px;}
.section-block h2{margin:0 0 10px;font-size:14px;font-weight:600;letter-spacing:.02em;text-transform:uppercase;color:var(--accent);display:flex;align-items:center;gap:8px;}
.section-block h2::before{content:"";width:16px;height:3px;border-radius:2px;background:var(--accent);opacity:.55;}
.section-block p{margin:0;font-size:16.5px;line-height:1.75;color:#3b4453;}
.section-block ol{margin:0;padding-left:0;list-style:none;counter-reset:step;}
.section-block ol li{position:relative;padding:0 0 0 40px;margin-bottom:16px;font-size:16.5px;line-height:1.7;color:#3b4453;counter-increment:step;}
.section-block ol li:last-child{margin-bottom:0;}
.section-block ol li::before{content:counter(step);position:absolute;left:0;top:1px;width:26px;height:26px;border-radius:50%;background:#e8f2fb;color:var(--accent);font-size:14px;font-weight:600;display:flex;align-items:center;justify-content:center;}
.video-placeholder{aspect-ratio:16/9;background:#eef4fa;border:none;border-radius:14px;display:flex;align-items:center;justify-content:center;color:var(--muted);font-size:14px;text-align:center;padding:20px;}
.back-link{display:inline-block;margin-bottom:16px;color:var(--accent);text-decoration:none;font-size:14px;}
.pending{color:#92400e;background:#fffbeb;border:1px solid #fde68a;padding:10px 14px;border-radius:8px;font-size:14px;}
footer{text-align:center;color:var(--muted);font-size:13px;padding:30px 16px;}
.group-title{font-size:19px;margin:34px 0 14px;padding-bottom:8px;border-bottom:2px solid var(--accent);color:var(--text);}
.group-title:first-of-type{margin-top:8px;}
.group-count{color:var(--muted);font-size:14px;font-weight:normal;}

/* Поиск */
.searchbar{position:sticky;top:0;z-index:20;background:var(--bg);padding:14px 16px;border-bottom:1px solid var(--border);}
.search-wrap{max-width:640px;margin:0 auto;position:relative;display:flex;align-items:center;}
.search-icon{position:absolute;left:14px;font-size:15px;pointer-events:none;opacity:.55;}
#search{width:100%;padding:13px 40px 13px 40px;border:1px solid var(--border);border-radius:24px;font-size:16px;background:#fff;color:var(--text);outline:none;}
#search:focus{border-color:var(--accent);box-shadow:0 0 0 3px rgba(47,143,221,.15);}
#search-clear{display:none;position:absolute;right:8px;border:none;background:#e5e7eb;color:#555;width:26px;height:26px;border-radius:50%;font-size:18px;line-height:1;cursor:pointer;}
.no-results{text-align:center;color:var(--muted);font-size:15px;padding:40px 0;}

/* Мобильная адаптация */
@media (max-width:600px){
  header{padding:22px 16px;}
  header h1{font-size:22px;}
  header p{font-size:13px;}
  .container{padding:16px 12px 50px;}
  .grid{grid-template-columns:1fr;gap:10px;}
  .card{padding:15px 16px;border-radius:12px;gap:4px;flex-direction:row;align-items:center;justify-content:space-between;}
  .card h3{font-size:16px;}
  .card .zh{font-size:12px;}
  .card .badge{flex-shrink:0;}
  .group-title{font-size:16px;margin:24px 0 10px;}
  #search{font-size:16px;padding:12px 38px;}
  .item-page h1{font-size:23px;margin:4px 0 18px;}
  .section-block{padding:0;margin-bottom:26px;}
  .section-block p,.section-block ol li{font-size:16px;}
}
.video-embed{position:relative;width:100%;aspect-ratio:16/9;border-radius:14px;overflow:hidden;background:#000;}
.video-embed iframe{position:absolute;inset:0;width:100%;height:100%;border:0;}

.detail{display:none;}
.detail.active{display:block;}
#listView.hidden{display:none;}
.card{cursor:pointer;}
</style>
</head><body>

<div id="listView">
<header>
<h1>Научные опыты для детей</h1>
<p>Русскоязычный каталог наборов &middot; 122 опытов, сгруппированы по темам</p>
</header>
<div class="searchbar">
<div class="search-wrap">
<span class="search-icon">&#128269;</span>
<input type="search" id="search" placeholder="Поиск опыта по названию..." autocomplete="off">
<button type="button" id="search-clear" aria-label="Очистить">&times;</button>
</div>
</div>
<div class="container" id="listContainer"></div>
<footer>Каталог научных опытов. Видео и полные инструкции добавляются постепенно.</footer>
</div>

<div id="detailView" class="item-page" style="display:none;">
<div class="container" id="detailContainer"></div>
<footer>Каталог научных опытов</footer>
</div>

<script>
var DATA = {"groups": [{"name": "Цвет, радуга и расслоение жидкостей", "ids": [3, 4, 7, 14, 30, 127, 79, 12, 60, 54, 175, 212]}, {"name": "Химические реакции: вулканы, газировка, кислоты", "ids": [13, 160, 37, 61, 281, 132, 5, 143, 82, 45, 52, 248, 369]}, {"name": "Масло, вода, плотность и плавучесть", "ids": [17, 47, 154, 258, 39, 285]}, {"name": "Опыты с яйцами", "ids": [15, 40, 19, 148, 109, 204]}, {"name": "Воздушные шарики", "ids": [10, 22, 157, 174, 103, 106, 233, 182, 136, 104]}, {"name": "Шарики для пинг-понга", "ids": [16, 74, 131, 210]}, {"name": "Мыльные пузыри", "ids": [141, 162]}, {"name": "Вода: поверхностное натяжение и атмосферное давление", "ids": [138, 100, 18, 134, 87, 178, 181, 92, 77, 68, 97, 149, 252, 222]}, {"name": "Свечи", "ids": [6, 102, 107]}, {"name": "Стаканы, банки и бутылки", "ids": [36, 38, 117, 120, 257, 272, 186]}, {"name": "Баланс, центр тяжести и инерция", "ids": [89, 112, 95, 41, 62, 224, 139, 251]}, {"name": "Статическое электричество", "ids": [110, 246, 111, 288, 266]}, {"name": "Звук", "ids": [48, 72, 216, 144]}, {"name": "Свет, зрение и оптические иллюзии", "ids": [56, 35, 161, 172, 145, 215, 293, 164]}, {"name": "Бумага: складывание, резка, конструкции", "ids": [108, 163, 155, 90, 142, 195, 105]}, {"name": "Температура, тепло и лёд", "ids": [28, 91, 261]}, {"name": "Механика и разное", "ids": [51, 64, 93, 115, 247, 255, 290, 370]}], "items": {"3": {"id": 3, "title": "Расслоение жидкостей", "materials": "Пищевой краситель, 3 мерных стакана, палочка для перемешивания, пипетка, самим подготовить: средство для мытья посуды, растительное масло, вода.", "steps": ["В три мерных стакана налейте по 30 мл: средства для мытья посуды, чистой воды и растительного масла.", "В средство для мытья посуды капните 10 капель красителя и перемешайте; в воду — 5 капель красителя другого цвета и перемешайте.", "С помощью пипетки постепенно добавьте окрашенную воду, а затем масло в стакан со средством для мытья посуды — получится красивое расслоение жидкостей."], "principle": "У моющего средства, воды и масла разная плотность — у моющего средства она наибольшая, у воды — средняя, у масла — наименьшая. Более плотная жидкость тяжелее и опускается вниз, менее плотная — легче и остаётся сверху, поэтому жидкости расслаиваются.", "video": "qNymBaUTmts"}, "4": {"id": 4, "title": "Цветная эстафета", "materials": "Пищевой краситель, 6 мерных стаканов, палочка для перемешивания, самим подготовить: 6 бумажных салфеток, вода.", "steps": ["В 3 стакана налейте по 60 мл воды и добавьте краситель разных цветов, перемешайте.", "Между двумя стаканами с окрашенной водой поставьте по одному пустому стакану.", "Сложите салфетку пополам дважды, один конец опустите в окрашенную воду, другой — в пустой стакан. Через два часа понаблюдайте за изменениями в пустом стакане."], "principle": "Внутри бумажной салфетки много тонких «каналов», вода прилипает к их стенкам, и из-за разницы сил сцепления и притяжения вода постепенно переносит окрашенную жидкость в пустой стакан. Это явление называется «капиллярностью». В жизни оно проявляется часто — например, кирпич впитывает воду, полотенце впитывает пот.", "video": ""}, "7": {"id": 7, "title": "Цветной жемчужный дождь", "materials": "Мерный стакан, пищевой краситель, пипетка, самим подготовить: прозрачная бутылка, растительное масло, вода.", "steps": ["Налейте в прозрачную бутылку растительное масло примерно наполовину.", "Возьмите три мерных стакана, налейте в каждый по 20 мл воды и добавьте краситель разных цветов, перемешайте.", "С помощью пипетки набирайте окрашенную жидкость из стаканов и капайте в бутылку с маслом — капли будут опускаться вниз, словно жемчужины."], "principle": "Растительное масло состоит в основном из смешанных глицеридов (органическое вещество), а вода — неорганическое вещество, их молекулярное строение сильно различается, поэтому они не смешиваются. Плотность у них тоже разная — вода плотнее масла, поэтому окрашенные капли воды опускаются на дно бутылки, образуя шарики.", "video": ""}, "14": {"id": 14, "title": "Радужный дождь", "materials": "Пищевой краситель, мерный стакан, палочка для перемешивания, самим подготовить: вода, растительное масло, прозрачная бутылка.", "steps": ["В мерный стакан налейте 20 мл растительного масла и добавьте по 5 капель красного, жёлтого и синего красителя, слегка перемешайте.", "В прозрачную бутылку налейте около 150 мл воды.", "Вылейте всё окрашенное масло в бутылку с водой — через 10 секунд покоя в бутылке появится завораживающий «радужный дождь»."], "principle": "Плотность растительного масла меньше плотности воды, поэтому окрашенное маслом сначала остаётся сверху. Через некоторое время краситель (у которого плотность выше) начинает опускаться и растворяться в воде, создавая эффект медленно падающего цветного дождя.", "video": ""}, "30": {"id": 30, "title": "Радуга в стакане", "materials": "Пищевой краситель, пробирка, 3 мерных стакана, пипетка, мерная ложка, самим подготовить: сахар, тёплая вода.", "steps": ["Возьмите 3 мерных стакана — A, B, C, налейте в каждый по 20 мл тёплой воды и добавьте по 3 капли красителя разного цвета.", "Добавьте в стаканы соответственно 2, 4 и 6 ложек сахара и перемешайте до полного растворения.", "Пипеткой наберите 3 мл раствора C и осторожно, по стенке пробирки, влейте его внутрь. Так же влейте 3 мл раствора B, затем 3 мл раствора A — получится красивая радуга."], "principle": "В одинаковое количество воды добавлено разное количество сахара, поэтому плотность растворов отличается: чем больше сахара, тем выше плотность. Плотная жидкость тяжелее и опускается на дно, менее плотная остаётся сверху — так и получается многослойная радуга.", "video": ""}, "127": {"id": 127, "title": "Твёрдая радуга", "materials": "4 мерных стакана, 3 флакона пищевого красителя, водопоглощающий гидрогель, мерная ложка, палочка для перемешивания, самим подготовить: вода.", "steps": ["Налейте по 30 мл воды в 3 стакана и добавьте в каждый краситель своего цвета.", "Добавьте в каждый стакан по две ложки гидрогеля и хорошо перемешайте, чтобы он впитал воду.", "Ложкой поочерёдно выложите разноцветные шарики гидрогеля в четвёртый, пустой стакан."], "principle": "Водопоглощающий гидрогель способен впитывать воду в сотни и тысячи раз больше собственного веса и хорошо удерживать её. Широко применяется в гигиенических изделиях — например, в детских подгузниках. Впитывая окрашенную воду разных цветов, можно собрать красивую твёрдую радугу.", "video": ""}, "79": {"id": 79, "title": "Диффузия красителя", "materials": "2 мерных стакана, мерная ложка, пищевой краситель, самим подготовить: вода, соль.", "steps": ["В один стакан добавьте 30 мл соли, долейте воду доверху, перемешайте и оставьте на 30 секунд.", "Второй стакан наполните обычной водой.", "Капните в оба стакана по 3 капли красителя и понаблюдайте, как краситель расходится в каждом из них."], "principle": "Диффузия — перемещение вещества из области высокой концентрации в область низкой, пока оно не распределится равномерно. Плотность красителя выше плотности обычной воды, поэтому в ней он быстро расходится вниз. Солёная вода плотнее красителя, поэтому он сначала «зависает» на её поверхности и лишь постепенно расходится.", "video": ""}, "12": {"id": 12, "title": "Цветной фонтан", "materials": "Сода, палочка для перемешивания, лимонная кислота, пищевой краситель, мерная ложка, мерный стакан, воронка, самим подготовить: средство для мытья посуды, бутылка, вода.", "steps": ["Налейте в бутылку воду на три четверти, через воронку добавьте 3 ложки лимонной кислоты (перемешайте палочкой).", "Добавьте 10 капель красного красителя, затем влейте примерно 20 мл средства для мытья посуды.", "В мерном стакане растворите три ложки соды в небольшом количестве воды.", "Быстро вылейте раствор соды в бутылку — фонтан забьёт непрерывным потоком."], "principle": "Сода и лимонная кислота, реагируя, образуют большое количество углекислого газа, который вспенивает растворённое в жидкости моющее средство и выталкивает пену наружу — так возникает цветной фонтан.", "video": ""}, "60": {"id": 60, "title": "Радужный пузырьковый дракон", "materials": "Пищевой краситель, мерная ложка, воронка, резинка, мерный стакан, специальная плёнка для пузырей (можно заменить марлей или полотенцем), самим подготовить: сахар, вода, средство для мытья посуды, тарелка.", "steps": ["В первый стакан налейте 40 мл воды, во второй — 10 мл средства для мытья посуды; в воду добавьте 2 ложки сахара и перемешайте, затем вылейте сладкую воду в средство для мытья посуды и перемешайте.", "Перелейте готовый мыльный раствор в тарелку.", "Натяните плёнку (или марлю) на широкий конец воронки и закрепите резинкой.", "Обмакните плёнку в мыльный раствор, затем нанесите несколько капель красителя разных цветов.", "Подуйте с другого конца воронки — появится красивый радужный «пузырьковый дракон»!"], "principle": "На плёнке множество крошечных пор — каждая работает как маленькая трубочка для выдувания пузыря, благодаря чему появляется множество аккуратно выстроенных мелких пузырьков. Краситель на плёнке окрашивает пузыри, создавая радужную цепочку.", "video": ""}, "54": {"id": 54, "title": "Исчезающий цветок", "materials": "Полиэтиленовый пакет, самим подготовить: белая бумага, ножницы, цветные фломастеры, стакан, вода.", "steps": ["Вырежьте из бумаги листок чуть меньше размера пакета и нарисуйте на нём красивый цветок.", "Положите листок с рисунком в пакет.", "Опустите пакет прямо в воду в стакане — цветок словно чудесным образом исчезнет."], "principle": "Свет распространяется прямолинейно. При переходе из воздуха в воду луч преломляется, и это обманывает наши глаза. При правильном угле предмет в стакане кажется невидимым.", "video": ""}, "175": {"id": 175, "title": "Чай, меняющий цвет", "materials": "2 мерных стакана, сода, лимонная кислота, мерная ложка, палочка для перемешивания, самим подготовить: чай (лучше чёрный) и кипяток.", "steps": ["Заварите в одном стакане 40 мл крепкого чая, затем уберите чайные листья.", "Добавьте в чай половину ложки соды и медленно помешивайте — цвет чая станет темнее.", "Медленно добавьте немного лимонной кислоты и снова помешайте — цвет чая снова станет светлее."], "principle": "Растворённая сода окисляет ионы железа до трёхвалентного состояния, а в чае содержится танин — их соединение образует чёрный танат железа, из-за чего чай темнеет. Лимонная кислота обладает восстанавливающими свойствами и способна восстановить трёхвалентное железо обратно до двухвалентного — чёрный цвет исчезает, и чай снова светлеет.", "video": ""}, "212": {"id": 212, "title": "Сосна, меняющая цвет", "materials": "Самим подготовить: восковые мелки, лист A4.", "steps": ["Нарисуйте на листе A4 сосну.", "Закрасьте сосну синим восковым мелком.", "Затем поверх синего слоя закрасьте сосну жёлтым мелком и понаблюдайте, как меняется цвет — сосна станет зелёной."], "principle": "Красный, жёлтый и синий — основные цвета красок, теоретически из них можно получить любой другой цвет. Попробуйте вместе посоревноваться, кто сможет получить больше разных цветов.", "video": ""}, "13": {"id": 13, "title": "Извержение вулкана", "materials": "Шипучие таблетки, пищевой краситель, самим подготовить: растительное масло, прозрачная бутылка, вода.", "steps": ["В бутылку налейте по порядку: одну пятую чистой воды, три пятых растительного масла и добавьте 5–10 капель красителя.", "Бросьте в бутылку половину шипучей таблетки — со дна начнёт красиво подниматься «вулканическая лава»."], "principle": "Шипучая таблетка при контакте с водой быстро выделяет большое количество углекислого газа. Когда газа накапливается достаточно, он выносит окрашенную воду через слой масла к поверхности, и она выплёскивается наружу — получается эффектная имитация извержения вулкана.", "video": ""}, "160": {"id": 160, "title": "Вулкан под водой", "materials": "Пищевой краситель, пипетка, самим подготовить: стеклянная бутылочка, стеклянные шарики, холодная вода, горячая вода.", "steps": ["Налейте в маленькую стеклянную бутылочку горячую воду на 3/4.", "Аккуратно добавьте несколько стеклянных шариков внутрь для утяжеления бутылочки.", "Капните в бутылочку несколько капель красителя и быстро полностью погрузите её в холодную воду.", "Окрашенная горячая вода начнёт подниматься из горлышка бутылочки к поверхности, словно подводное извержение вулкана."], "principle": "В горячей воде молекулы двигаются быстрее, расстояние между ними растёт, объём увеличивается, а плотность падает. Поэтому горячая вода поднимается вверх, а холодная опускается вниз.", "video": ""}, "37": {"id": 37, "title": "Лимон «извергает огонь»", "materials": "Свеча, самим подготовить: зажигалка, лимон/апельсин, нож для фруктов.", "steps": ["Срежьте с лимона небольшой кусочек цедры.", "Зажгите свечу. Поднесите цедру близко к пламени и сожмите её пальцами, чтобы сок брызнул в огонь — понаблюдайте за реакцией пламени (лимон можно заменить апельсином)."], "principle": "В цедре лимона (апельсина) содержится натуральное эфирное масло — горючее органическое вещество. При сжатии цедры возле пламени масло выбрызгивается и воспламеняется, давая яркую вспышку с треском.", "video": ""}, "61": {"id": 61, "title": "Молоко встречает лимонную кислоту", "materials": "Лимонная кислота, мерный стакан, палочка для перемешивания, мерная ложка, самим подготовить: молоко.", "steps": ["Налейте молоко в стакан, затем добавьте в него лимонную кислоту.", "Перемешайте, дайте раствору немного постоять, затем внимательно рассмотрите его — появятся хлопья (для более наглядного эффекта можно перелить раствор в другую ёмкость)."], "principle": "Молоко богато белком, а лимонная кислота содержит много кислых веществ. При смешивании с кислотой белок денатурирует (сворачивается), поэтому в стакане появляется белый творожистый осадок.", "video": ""}, "281": {"id": 281, "title": "Кола плюс молоко", "materials": "Палочка для перемешивания, самим подготовить: стакан, молоко, кола.", "steps": ["Налейте в стакан колу на 2/3, добавьте молоко, тщательно перемешайте и оставьте на 10 и более минут."], "principle": "Хлопья, образующиеся при смешивании колы и молока, — это в основном денатурированный и выпавший в осадок белок молока. Такой денатурированный белок сам по себе довольно рыхлый и естественным образом проходит через процесс пищеварения в организме, под действием протеаз и пептидаз превращаясь в питательные вещества — камней в организме он не образует.", "video": ""}, "132": {"id": 132, "title": "Хитрый способ открыть банку колы", "materials": "Самим подготовить: две банки газировки.", "steps": ["Сильно встряхните банку и сразу откройте — газировка выплеснется наружу.", "Возьмите вторую банку, сильно встряхните, затем постучите пальцем по её корпусу и только потом быстро откройте."], "principle": "Кола — газированный напиток; при встряхивании угольная кислота легко разлагается на углекислый газ и воду. При открытии давление падает, растворимость газа снижается, пузырьки расширяются и вырываются наружу. Если постучать по банке, пузырьки успевают подняться и собраться у горлышка, поэтому газ выходит сразу и напиток не выплёскивается.", "video": ""}, "5": {"id": 5, "title": "Искусственный снег", "materials": "Водопоглощающий гидрогель, мерный стакан, мерная ложка, самим подготовить: вода.", "steps": ["В мерный стакан насыпьте небольшую ложку гидрогеля и добавьте 20 мл воды.", "Через 5 секунд переверните стакан — вода «исчезнет». Если использовать непрозрачный стакан, получится настоящий фокус.", "Можно добавить краситель в воду перед тем, как налить её в стакан с гидрогелем, чтобы получить цветной «снег»."], "principle": "Белый порошок — это высокопоглощающий гидрогель, способный впитать воды в 100 и более раз больше своего объёма (такой же материал используется внутри детских подгузников). Из цветного «снега» можно даже сделать «радужное кашпо» — если добавить слой почвы на дно, растения будут расти ещё лучше.", "video": ""}, "143": {"id": 143, "title": "Искусственный иней", "materials": "Мерный стакан, самим подготовить: вода, поваренная соль, металлическая банка, палочка для перемешивания, ножницы, лёд.", "steps": ["Ножницами срежьте верхнюю часть металлической банки (лучше с помощью взрослых).", "Насыпьте в банку заранее подготовленный лёд.", "Мерным стаканом налейте немного воды — чуть ниже уровня льда, затем отмерьте столько же соли и добавьте в банку.", "Оставьте банку в покое и понаблюдайте за происходящим."], "principle": "Поверхность банки со льдом очень холодная, а воздух рядом — заметно теплее. При контакте тёплый воздух охлаждается до пересыщения водяным паром; при температуре ниже нуля избыточная влага кристаллизуется на поверхности предмета в виде инея.", "video": ""}, "82": {"id": 82, "title": "Натуральные дрожжи", "materials": "Шарик, самим подготовить: бутылка, тёплая вода 30°C, сахар, яблоко.", "steps": ["Налейте в бутылку немного тёплой воды (около 30°C).", "С помощью воронки всыпьте немного сахара.", "Нарежьте яблоко полосками и положите в бутылку.", "Наденьте шарик на горлышко бутылки. Через 24 часа шарик заметно надуется."], "principle": "В яблоках содержатся природные дрожжевые грибки, способные расти как с кислородом, так и без него. При наличии кислорода они быстро разлагают сахар на углекислый газ и воду. В условиях нехватки кислорода дрожжи разлагают сахар на спирт и углекислый газ — именно он и надувает шарик!", "video": ""}, "45": {"id": 45, "title": "Фруктовое моющее средство своими руками", "materials": "Мерный стакан, мерная ложка, палочка для перемешивания, сода, резинка, самим подготовить: лимон, соль, полиэтиленовый пакет, горячая вода.", "steps": ["Нарежьте лимон мелкими кусочками и положите в мерный стакан.", "Добавьте 80 мл горячей воды, половину ложки соды и половину ложки соли, перемешайте.", "Накройте стакан пакетом, закрепите резинкой и оставьте настаиваться 24 часа (для лучшего эффекта — неделю).", "Получившимся средством можно мыть посуду, овощи и фрукты — она станет чистой и приятно пахнущей, а заодно продезинфицируется."], "principle": "Кислота лимона — природный «антисептик» и «обезжириватель». Сода вступает в реакцию с жиром (эмульгирует его). Соль ускоряет удаление жирных пятен.", "video": ""}, "52": {"id": 52, "title": "Откуда берётся соль", "materials": "Мерный стакан, палочка для перемешивания, мерная ложка, самим подготовить: тарелка, соль, вода.", "steps": ["Налейте в мерный стакан 60 мл воды.", "Добавляйте соль небольшими порциями, постоянно перемешивая, пока соль не перестанет растворяться.", "Получившийся раствор (имитация морской или озёрной воды) вылейте на тарелку и поставьте на солнце для выпаривания.", "Когда вода полностью испарится, на тарелке останется слой белых кристаллов соли."], "principle": "С древности люди добывали соль, выпаривая морскую воду, воду солёных озёр и источников. Сегодня соль всё ещё добывают этим способом, а также добычей и переработкой каменной соли.", "video": ""}, "248": {"id": 248, "title": "Соль с «острыми зубами»", "materials": "2 мерных стакана, палочка для перемешивания, мерная ложка, самим подготовить: хлопковая верёвка (30 см), тарелка, соль, вода.", "steps": ["Налейте в оба стакана по 80 мл воды и поставьте их на тарелку.", "Добавляйте в оба стакана соль и перемешивайте, пока она не перестанет растворяться и на дне не останется немного нерастворённой соли.", "Смочите верёвку и опустите оба её конца в разные стаканы так, чтобы середина провисала дугой.", "Оставьте конструкцию на сухом, хорошо проветриваемом месте минимум на 12 часов (чем дольше, тем заметнее эффект) — на верёвке вырастет множество «острых зубов»-кристаллов."], "principle": "Солёная вода поднимается по верёвке благодаря капиллярному эффекту. По мере испарения воды с верёвки (часть кристаллов соли выпадает на тарелку) оставшиеся кристаллы соли собираются вместе, образуя неправильные геометрические скопления.", "video": ""}, "17": {"id": 17, "title": "Разделение масла и воды", "materials": "Пищевой краситель, пробирка, штатив для пробирок, пипетка, самим подготовить: растительное масло, вода.", "steps": ["Пипеткой наберите воду, перелейте в пробирку, добавьте несколько капель красителя и хорошо растворите.", "Пипеткой добавьте в пробирку около 3 мл растительного масла, закройте пробкой, встряхните, чтобы жидкости перемешались, затем поставьте пробирку в штатив и оставьте на некоторое время — масло и вода снова разделятся на слои."], "principle": "В обычных условиях молекулы масла и воды отличаются по размеру, плотности и вязкости, поэтому не смешиваются между собой. Вода плотнее масла, поэтому масло оказывается сверху.", "video": ""}, "47": {"id": 47, "title": "Смешивание масла и воды", "materials": "Мерный стакан, пищевой краситель, пробирка, штатив для пробирок, пипетка, самим подготовить: средство для мытья посуды, растительное масло.", "steps": ["Пипеткой наберите воду, перелейте в пробирку, добавьте несколько капель красителя и хорошо растворите.", "Добавьте около 3 мл растительного масла, затем немного средства для мытья посуды, плотно закройте пробкой и встряхните. Поставьте в штатив и оставьте на некоторое время — на этот раз масло и вода не расслоятся."], "principle": "Средство для мытья посуды эмульгирует масло (превращает в мельчайшие капли) и не даёт им снова собраться вместе — масло равномерно распределяется по воде во взвешенном состоянии.", "video": ""}, "154": {"id": 154, "title": "Водоизмещение", "materials": "1 мерный стакан, самим подготовить: прозрачная стеклянная/пластиковая банка, маркер, вода.", "steps": ["Налейте в прозрачную банку воду на три четверти объёма.", "Положите камешек в мерный стакан — представим, что это «груз» на «корабле».", "Поставьте стакан с грузом в банку с водой, чтобы «корабль» плавал с грузом внутри.", "Отметьте маркером уровень воды.", "Выньте камешек, чтобы «пустой корабль» плавал сам по себе, и отметьте новый уровень воды."], "principle": "Вода несжимаема, и когда в неё погружается предмет, она отходит в стороны. Поэтому с грузом уровень воды поднимается выше, чем без груза — это принцип водоизмещения. Если груз намного тяжелее воды, водоизмещение станет слишком большим, и «корабль» затонет.", "video": ""}, "258": {"id": 258, "title": "Закон Архимеда", "materials": "Резинка, самим подготовить: хлопковая нить (20 см), пластиковая бутылка, пластиковый таз/ведро, вода.", "steps": ["Наполните пластиковую бутылку водой доверху и плотно закрутите крышку.", "Закрепите резинку на обоих концах бутылки так, чтобы вес был сбалансирован.", "Привяжите нить к резинке так, чтобы бутылку можно было поднимать.", "Держа нить, опустите бутылку в воду.", "Повторите несколько раз, погружая и вынимая бутылку из воды: резинка натягивается сильнее, когда бутылка вынута, и слабее — когда погружена глубже."], "principle": "Все тела, включая бутылку из этого опыта, испытывают в воде действие выталкивающей силы. Чем глубже бутылка погружена в воду, тем больше воды она вытесняет и тем больше выталкивающая сила, действующая на неё. Когда бутылка полностью погружена, вес вытесненной ею воды примерно равен весу воды, которая поместилась бы внутри самой бутылки. Именно благодаря выталкивающей силе мы отчётливо ощущаем, что бутылка становится легче при погружении в воду.", "video": ""}, "39": {"id": 39, "title": "Простой фильтр для воды", "materials": "2 мерных стакана, самим подготовить: бумажные салфетки, мутная (грязная) вода.", "steps": ["Налейте в мерный стакан мутную воду.", "Сложите салфетку длинной полоской, один конец опустите в пустой стакан, другой — в мутную воду. Наблюдайте каждые полчаса.", "Через два часа в стакане с мутной водой останется примерно половина, а в пустом стакане появится около половины чистой воды."], "principle": "Внутри салфетки много тонких «каналов» — вода прилипает к их стенкам и постепенно переносится в пустой стакан, а частицы грязи «не проходят» — так вода очищается. Это «капиллярность».", "video": ""}, "15": {"id": 15, "title": "Мраморное яйцо", "materials": "Пищевой краситель, самим подготовить: белый уксус, стеклянный стакан, сырое яйцо.", "steps": ["Вымойте яйцо и положите в стеклянный стакан, залейте уксусом так, чтобы он полностью покрыл яйцо (понаблюдайте, что происходит в стакане).", "Добавьте 8–10 капель зелёного красителя и перемешайте.", "Через 24 часа скорлупа исчезнет, яйцо увеличится в объёме и станет ярким «пасхальным» яйцом (для лучшего результата можно промыть яйцо и снова замочить на 24 часа в свежем уксусе с красителем)."], "principle": "Скорлупа яйца состоит в основном из карбоната кальция — щелочного вещества. Она вступает в реакцию с кислым уксусом, растворяется и выделяет большое количество углекислого газа. После растворения скорлупы остаётся полупрозрачная плёнка, через которую окрашенный уксус проникает внутрь — яйцо увеличивается и меняет цвет.", "video": ""}, "40": {"id": 40, "title": "Выдутое яйцо", "materials": "Мерный стакан, шарик, самим подготовить: булавка, сырое яйцо.", "steps": ["Булавкой проделайте с обеих сторон яйца по отверстию диаметром около 3 мм.", "Приложите одно отверстие к краю мерного стакана, чтобы собирать вытекающее содержимое.", "Надуйте шарик и прижмите его горлышко к отверстию сверху яйца, медленно сжимая шарик.", "Содержимое постепенно вытечет. Снимите шарик и потрясите яйцо, чтобы ускорить процесс — продолжайте, пока из отверстий не начнёт выходить только воздух."], "principle": "Давление воздуха из шарика действует на содержимое яйца и выталкивает его в стакан — так скорлупа полностью освобождается изнутри.", "video": ""}, "19": {"id": 19, "title": "Парящее яйцо", "materials": "Пищевой краситель, мерный стакан, палочка для перемешивания, самим подготовить: сырое яйцо, высокий стеклянный стакан, вода, соль.", "steps": ["Налейте в стеклянный стакан 150 мл воды и положите яйцо — оно опустится на дно. Как заставить его «парить»?", "Отмерьте мерным стаканом 100 мл воды и 50 мл соли, всыпьте в стеклянный стакан и перемешивайте, пока соль не растворится, затем положите туда яйцо.", "В мерный стакан налейте 60 мл воды и добавьте немного красителя, перемешайте.", "Аккуратно, по палочке для перемешивания, влейте окрашенную воду в стакан с солёной водой — яйцо «зависнет» посередине стакана."], "principle": "Плотность яйца больше плотности обычной воды, поэтому оно тонет. Но если добавить в воду соль и получить раствор высокой концентрации, плотность солёной воды становится выше плотности яйца, поэтому яйцо останавливается на границе между пресной и солёной водой.", "video": ""}, "148": {"id": 148, "title": "Яйцо без скорлупы", "materials": "Сода, самим подготовить: стеклянная банка с широким горлышком, уксус, варёное яйцо, бумажная салфетка.", "steps": ["Очистите яйцо от скорлупы, подожгите половину салфетки и бросьте в банку, затем положите очищенное яйцо на горлышко.", "Яйцо сожмётся и «проскользнёт» внутрь банки.", "Налейте в банку по очереди соду и уксус, быстро переверните банку на тарелку — через некоторое время яйцо самостоятельно «выберется» наружу."], "principle": "Пламя расходует кислород внутри банки, давление падает ниже атмосферного, и наружное давление вдавливает яйцо внутрь. Обратно яйцо выталкивает химическая реакция соды с уксусом: образуется много углекислого газа, давление внутри становится выше внешнего и выталкивает яйцо наружу.", "video": ""}, "109": {"id": 109, "title": "Как отличить варёное яйцо от сырого", "materials": "Самим подготовить: одно сырое и одно варёное яйцо, маркер.", "steps": ["Нарисуйте маркером на одном яйце улыбающееся лицо, на другом — грустное.", "Раскрутите яйцо с улыбкой, слегка коснитесь его пальцем, чтобы остановить, и понаблюдайте, продолжает ли оно вращаться после остановки.", "Так же раскрутите яйцо с грустным лицом и понаблюдайте за тем же."], "principle": "У варёного яйца всё содержимое твёрдое, поэтому оно останавливается целиком вместе со скорлупой. У сырого яйца скорлупа останавливается сразу, а жидкость внутри продолжает вращаться по инерции — поэтому яйцо снова начинает крутиться, увлекаемое движением жидкости внутри.", "video": ""}, "204": {"id": 204, "title": "Яйца строят пирамиду", "materials": "Самим подготовить: 2 яйца, крышка от бутылки, соль.", "steps": ["Сначала поставьте первое яйцо на крышку от бутылки и попробуйте поставить сверху второе яйцо — оно не удержится.", "Насыпьте немного соли на первое яйцо, поставьте второе яйцо на соль и слегка подрегулируйте положение — яйцо неожиданно устоит."], "principle": "Крупинки соли увеличивают трение и одновременно образуют устойчивую треугольную опору в точке контакта со сферической поверхностью яйца, благодаря чему второе яйцо удерживается на месте.", "video": ""}, "10": {"id": 10, "title": "Лимон лопает шарик", "materials": "Шарик, самим подготовить: лимон/апельсин, нож для фруктов.", "steps": ["Надуйте шарик и туго завяжите. Ножом срежьте небольшой кусочек цедры лимона (лимон можно заменить апельсином).", "Сожмите цедру над шариком так, чтобы сок брызнул на его поверхность — шарик лопнет."], "principle": "На цедре лимона (апельсина) есть слой масляных желёзок, содержащих лимонен и другие органические растворители, которые растворяют резину на поверхности шарика, из-за чего он легко лопается.", "video": ""}, "22": {"id": 22, "title": "Шарик-силач", "materials": "Шарик, самим подготовить: бумажная салфетка, зажигалка, стеклянная банка с широким горлышком (например, из-под йогурта).", "steps": ["Надуйте шарик.", "Оторвите полоску от салфетки, сверните её в жгутик и подожгите.", "Через несколько секунд, когда салфетка хорошо разгорится, бросьте её в сухую банку (если есть спички — можно бросить в банку зажжённую спичку).", "Быстро закройте горлышко банки шариком, чтобы воздух не попадал внутрь.", "Через некоторое время приподнимите шарик — и банка поднимется вместе с ним!"], "principle": "Когда горящая полоска попадает в банку, а шарик закрывает горлышко, пламя расходует весь кислород внутри банки. Давление внутри становится ниже атмосферного, и наружное давление, словно невидимая рука, вжимает шарик внутрь банки — благодаря этому банка «прилипает» к шарику и поднимается вместе с ним.", "video": ""}, "157": {"id": 157, "title": "Взрывной характер шарика", "materials": "2 шарика, самим подготовить: 1 стеклянный шарик, 1 монета.", "steps": ["Положите стеклянный шарик в один шарик, а монету — в другой.", "Надуйте оба шарика примерно до одинакового размера и туго завяжите, затем одновременно отпустите их с одинаковой высоты."], "principle": "Стеклянный шарик круглый и при ударе соприкасается с оболочкой по большей площади — давление в точке удара меньше, повреждение минимально. Монета более «острая»: точка контакта маленькая, давление большое, а вытянутая форма создаёт неравномерную нагрузку — из-за этого шарик с монетой чаще лопается.", "video": ""}, "174": {"id": 174, "title": "Волшебный шарик", "materials": "Шарик, самим подготовить: пластиковая бутылка, горячая вода, холодильник.", "steps": ["Поставьте пустую бутылку в холодильник на час.", "Достаньте бутылку и быстро наденьте шарик на горлышко.", "Поставьте бутылку в миску с горячей водой — вы увидите, как шарик надувается, словно его надувает «невидимый рот»."], "principle": "Вода передаёт тепло воздуху внутри бутылки, из-за чего он расширяется и требует больше пространства. Избыточный воздух устремляется в шарик и надувает его.", "video": ""}, "103": {"id": 103, "title": "Пустая бутылка надувает шарик", "materials": "Шарик, самим подготовить: пластиковая бутылка, 2 миски, горячая вода около 80°C, холодная вода.", "steps": ["Наденьте шарик на горлышко пустой бутылки.", "Налейте в две миски горячую и холодную воду (ещё эффектнее — ледяную).", "Поставьте бутылку в миску с горячей водой — шарик постепенно надуется.", "Переставьте бутылку в холодную воду — шарик сдуется, а если снова поставить в горячую — опять надуется."], "principle": "Когда бутылка стоит в горячей воде, воздух внутри неё нагревается и расширяется, «раздувая» шарик. В холодной воде воздух охлаждается и сжимается — шарик снова уменьшается (принцип теплового расширения воздуха).", "video": ""}, "106": {"id": 106, "title": "Канатная дорога из шарика", "materials": "Шарик, трубочка, самим подготовить: ножницы, двусторонний скотч, тонкая верёвка.", "steps": ["Проденьте верёвку через трубочку.", "Двусторонним скотчем приклейте надутый шарик к трубочке.", "Отпустите горлышко шарика — он «поедет» вдоль верёвки, словно вагончик канатной дороги."], "principle": "Когда воздух выходит из шарика, шарик оказывает силу на воздух, а по третьему закону Ньютона воздух оказывает равную обратную силу на шарик, толкая его в противоположную сторону. Поскольку шарик закреплён на трубочке, вместе с ней он и скользит по верёвке.", "video": ""}, "233": {"id": 233, "title": "Свободное падение шарика", "materials": "Шарик, самим подготовить: пластиковая тарелка.", "steps": ["Надуйте шарик, завяжите его и отпустите в свободном падении — понаблюдайте за происходящим.", "Положите шарик в пластиковую тарелку и уроните их вместе — понаблюдайте за происходящим."], "principle": "При падении тарелки над ней образуется область с пониженным давлением, и шарик оказывается словно «присосан» к тарелке — по тому же принципу, по которому поезд, проходящий мимо станции, «затягивает» стоящих рядом людей. Поэтому шарик падает вместе с тарелкой значительно быстрее.", "video": ""}, "182": {"id": 182, "title": "Шарик превращается в мяч", "materials": "2 больших шарика, самим подготовить: двусторонний скотч.", "steps": ["Надуйте оба шарика примерно до одинакового размера и завяжите.", "Обклейте один шарик двусторонним скотчем по кругу, как сетка волейбольного мяча.", "Ударьте по шарику без скотча — он летит в произвольном направлении.", "Ударьте по подготовленному «мячу» — он летит вперёд в заданном направлении, как настоящий волейбольный мяч."], "principle": "Обмотка скотчем увеличивает вес шарика, делая его более управляемым, и повышает коэффициент упругости: чем он выше, тем труднее предмету деформироваться, а возникающая при деформации упругая сила оказывается сильнее — поэтому шариком можно играть, как волейбольным мячом.", "video": ""}, "136": {"id": 136, "title": "Запуск «пушечного» шарика", "materials": "Шарик для пинг-понга, самим подготовить: двусторонний скотч, тарелка, фен, лист A4.", "steps": ["Сверните лист A4 по узкой стороне в трубку чуть большего диаметра, чем шарик, и склейте.", "Положите шарик на тарелку, наклоните трубку так, чтобы её нижний конец был рядом с шариком.", "Включите фен на максимальный холодный обдув и наклонно направьте поток в верхнее отверстие трубки.", "Через некоторое время шарик выстрелит из трубки, словно снаряд."], "principle": "Поток от фена засасывает шарик в трубку и выстреливает им наружу. Чем выше скорость потока, тем ниже внутреннее давление — это принцип Бернулли, открытый в 1738 году.", "video": ""}, "104": {"id": 104, "title": "Дружелюбная ладошка", "materials": "Самим подготовить: резиновая перчатка/шарик, бутылка от минеральной воды, ножницы, глубокий таз, вода.", "steps": ["Отрежьте ножницами дно бутылки.", "Наденьте перчатку на горлышко бутылки со стороны отверстия и плотно закрепите, чтобы не было утечки воздуха.", "Наполните таз водой, погрузите открытое дно бутылки в воду — перчатка надуется.", "Достаньте бутылку из воды — перчатка сдуется; повторите погружение — она снова надуется."], "principle": "Когда бутылку опускают в воду, вода заходит внутрь и вытесняет воздух вверх — он попадает в перчатку. По мере того как воды в бутылке становится больше, давление воздуха в перчатке растёт, и она надувается.", "video": ""}, "16": {"id": 16, "title": "Вода засасывает шарик для пинг-понга", "materials": "Шарик для пинг-понга, самим подготовить: вода, пластиковая бутылка.", "steps": ["Положите шарик на горлышко пустой бутылки, придержите его рукой, переверните бутылку вверх дном и отпустите шарик — он упадёт.", "Наполните бутылку водой доверху (лучше, чтобы вода была на грани перелива).", "Положите шарик на горлышко, придержите рукой и переверните бутылку.", "Отпустите руку — шарик «прилипнет» и не упадёт."], "principle": "Всё дело в атмосферном давлении. Бутылка полностью заполнена водой, и давление внутри неё ниже, чем снаружи, поэтому атмосферное давление прижимает шарик к горлышку бутылки.", "video": ""}, "74": {"id": 74, "title": "Парящий шарик для пинг-понга", "materials": "Шарик для пинг-понга, фен (самим подготовить).", "steps": ["Направьте фен соплом вверх и включите его.", "Поместите шарик в поток воздуха и отпустите руку — шарик «зависнет» в воздухе.", "Медленно наклоняйте фен влево-вправо — шарик будет наклоняться вместе с потоком, но не упадёт.", "Попробуйте и другие лёгкие предметы — например, шарик из пенопласта — что ещё сможет «полетать»?"], "principle": "Опыт основан на эффекте Бернулли: чем выше скорость потока, тем ниже давление. Вокруг шарика в потоке скорость выше, а давление ниже, поэтому атмосферное давление удерживает шарик от смещения в стороны, а сила потока снизу уравновешивает силу тяжести — шарик «висит» в воздухе.", "video": ""}, "131": {"id": 131, "title": "Шарик для пинг-понга хочет нырнуть", "materials": "Мерный стакан, самим подготовить: шарик для пинг-понга, таз, вода.", "steps": ["Способ первый — «в лоб»: попытаться силой утопить шарик в глубокой воде. Неудача!", "Способ второй — «накрыть и придавить»: накрыть шарик стеклянным стаканом и с силой надавить вниз. Успех! Шарик наконец-то «погрузился» под воду!"], "principle": "Когда мы просто давим на шарик рукой, выталкивающая сила воды значительно превышает его вес, и он всплывает. А когда пустым стаканом накрывают шарик и вдавливают, воздух внутри стакана отталкивает воду в стороны — внутри воды не остаётся, и шарик естественным образом «придавливается» вместе со стаканом ко дну.", "video": ""}, "210": {"id": 210, "title": "Шарик для пинг-понга тонет", "materials": "1 шарик для пинг-понга, самим подготовить: таз с водой, стеклянный стакан, палочки для еды.", "steps": ["Опустите шарик в таз с водой.", "Потыкайте шарик палочками — он всё равно продолжает плавать на поверхности.", "Накройте шарик перевёрнутым стеклянным стаканом — шарик опустится на дно.", "Уберите стакан — шарик снова всплывёт на поверхность."], "principle": "Когда пустой стакан переворачивают и опускают в воду, воздух внутри него занимает объём и вытесняет воду; поскольку внутри стакана не остаётся воды, шарик оказывается словно «придавленным» ко дну.", "video": ""}, "141": {"id": 141, "title": "Небольшие пузырьки", "materials": "Мерный стакан, трубочка, самим подготовить: средство для мытья посуды, тарелка, белый уксус, вода.", "steps": ["Отлейте половину средства для мытья посуды в пустой мерный стакан, добавьте воду и перемешайте.", "Обмакните трубочку в раствор и медленно выдуйте пузырь — посмотрите на его размер.", "В тот же раствор добавьте белый уксус и хорошо перемешайте.", "Снова обмакните трубочку и выдуйте пузырь, сравните размер."], "principle": "Пузырь из чистого раствора моющего средства крупнее, потому что оно снижает поверхностное натяжение воды. После добавления уксуса поверхностная активность раствора ослабевает, натяжение снова растёт — большой пузырь выдуть уже не получается.", "video": "12gHIWXMqhE"}, "162": {"id": 162, "title": "Прыгающий мыльный пузырь", "materials": "Трубочка, мерный стакан, самим подготовить: вода, средство для мытья посуды, шерстяные перчатки.", "steps": ["Налейте в мерный стакан воду и средство для мытья посуды, хорошо перемешайте.", "Наденьте шерстяные перчатки и трубочкой выдуйте пузырь прямо на перчатку."], "principle": "Пузырь образуется благодаря поверхностному натяжению воды — силе притяжения, действующей внутри вещества перпендикулярно поверхности соприкосновения соседних частей при растяжении. Молекулы воды на поверхности притягиваются друг к другу сильнее, чем к молекулам воздуха, и словно склеиваются между собой.", "video": ""}, "138": {"id": 138, "title": "Прижатая вода", "materials": "Мерный стакан/большой стакан, самим подготовить: прозрачная пластиковая бутылка.", "steps": ["Наполните бутылку водой, переверните её над стаканом и начните выливать так, чтобы горлышко было ниже края стакана.", "Когда уровень воды в стакане касается горлышка бутылки, вода внезапно перестаёт вытекать.", "Повторите опыт с пластиковой бутылкой — результат тот же."], "principle": "Опыт основан на атмосферном давлении. Когда уровень воды в стакане касается горлышка, сила атмосферного давления оказывается точно равна весу оставшейся в бутылке воды плюс давлению воздуха в ней — наступает равновесие сил, и вода перестаёт вытекать.", "video": ""}, "100": {"id": 100, "title": "Опыт с атмосферным давлением", "materials": "Мерный стакан, пищевой краситель, самим подготовить: вода, таз.", "steps": ["Добавьте краситель в воду и перемешайте, чтобы окрасить её.", "Переверните стакан вверх дном, вертикально погрузите его в воду, затем медленно приподнимите.", "Переверните стакан вверх дном, погрузите его в воду под наклоном, затем медленно приподнимите."], "principle": "При вертикальном погружении воздух внутри стакана не успевает выйти и сжимается водой — давление внутри становится выше, поэтому при подъёме вода выливается. При погружении под наклоном воздух успевает выйти, давление внутри становится ниже или равным наружному — поэтому при медленном подъёме вода не выливается и остаётся выше уровня воды в тазу.", "video": ""}, "18": {"id": 18, "title": "Вакуумный фонтан", "materials": "Трубочка, свеча, мерный стакан, пищевой краситель, самим подготовить: бутылка с крышкой, ножницы, вода.", "steps": ["Ножницами проделайте в крышке маленькое отверстие — ровно такое, чтобы через него проходила трубочка.", "Вставьте трубочку в отверстие наполовину, зажгите свечу и накапайте воск вокруг трубочки, чтобы загерметизировать соединение.", "Наполните мерный стакан водой, добавьте 5 капель красителя и перемешайте.", "Сильно втяните воздух через трубочку ртом, чтобы выкачать воздух из бутылки; не давая воздуху попасть обратно, согните трубочку, опустите её конец в окрашенную воду и разогните — вода начнёт «фонтанировать» в бутылку."], "principle": "Когда воздух из бутылки выкачан, давление внутри становится ниже атмосферного. Когда конец трубочки погружают в воду, внешнее давление проталкивает воду внутрь бутылки; как только давления выравниваются, уровень воды перестаёт подниматься.", "video": ""}, "134": {"id": 134, "title": "Поверхностное натяжение воды", "materials": "Мерный стакан, пищевой краситель, пипетка, самим подготовить: вода, стакан, тарелка.", "steps": ["Капните несколько капель красителя в мерный стакан, наполните его водой доверху, поставьте по центру тарелки.", "Пипеткой набирайте воду из другого стакана и по капле добавляйте в мерный стакан — сколько капель, по-вашему, потребуется, чтобы вода перелилась?"], "principle": "Кажется, что вода вот-вот перельётся, но в стакан можно добавить ещё много капель благодаря поверхностному натяжению — силе, стремящейся минимизировать площадь поверхности жидкости и придать ей выпуклую форму.", "video": ""}, "87": {"id": 87, "title": "Капля, которая не намокает", "materials": "Самим подготовить: большой стакан с водой, пустой стакан, лист бумаги.", "steps": ["Скомкайте бумагу в шарик и закрепите на дне пустого стакана, чтобы она не выпала.", "Переверните стакан вверх дном (донышком с бумагой вверх, горлышком вниз) и вертикально погрузите его в большой стакан с водой так, чтобы уровень воды был выше того места, где закреплена бумага.", "Вертикально достаньте стакан из воды — бумага внутри останется сухой."], "principle": "Хотя бумага в перевёрнутом стакане оказывается ниже уровня воды, кроме бумаги в стакане находится ещё и воздух. Когда стакан вертикально погружают в воду, воздух внутри не может выйти наружу и не пускает воду внутрь — так он и защищает бумагу от намокания.", "video": ""}, "178": {"id": 178, "title": "Танцующая капля воды", "materials": "Свеча, пипетка, мерный стакан, самим подготовить: металлическая ложка.", "steps": ["Пипеткой капните несколько капель воды на ложку и покачайте ею — капли «прилипнут» к ложке; вылейте воду — на ложке всё равно останутся влажные следы.", "Зажгите свечу и подержите ложку перевёрнутой над пламенем, чтобы она равномерно покрылась копотью.", "Капните воду на закопчённую ложку — как бы вы ни трясли её, капли остаются идеально круглыми, а после того, как вы выльете воду, на ложке не останется следов."], "principle": "Из-за неполного сгорания свечи образуются мельчайшие частицы чёрного углерода (сажи), которые оседают на ложке. Между водой и этими частицами образуется тонкий слой воздуха — возникает водоотталкивающий «эффект лотоса», и капля не может прилипнуть к ложке. Эффект лотоса — явление самоочищения листьев лотоса: под микроскопом на их поверхности видны тончайший пушок и мельчайшие восковые частицы, из-за которых капли воды собираются в шарики и, скатываясь, уносят с собой пыль.", "video": ""}, "181": {"id": 181, "title": "«Липкая» вода", "materials": "Мерный стакан, пищевой краситель, пипетка, самим подготовить: вода, 2 линзы (стекла).", "steps": ["Налейте в мерный стакан полстакана воды, капните несколько капель красителя и перемешайте.", "Сложите две линзы вместе, попробуйте сдвигать их друг относительно друга — они двигаются легко и свободно.", "Пипеткой капните несколько капель воды на поверхность линзы, затем снова сложите обе линзы вместе.", "Попробуйте снова сдвинуть верхнюю линзу — на этот раз ощущается, будто линзы «склеены» водой."], "principle": "Пространство между стёклами полностью заполняется водой, вытесняющей весь воздух; внешнее атмосферное давление становится больше давления между стёклами, поэтому они плотно прижимаются друг к другу. По такому же принципу работают присоски: воздух между ними и поверхностью вытесняется, и присоска держится за счёт атмосферного давления.", "video": ""}, "92": {"id": 92, "title": "Вода с «притяжением»", "materials": "Мерный стакан, самим подготовить: пластиковая карточка, 10 монет по 1 цзяо, тарелка, вода.", "steps": ["Поставьте мерный стакан на поднос и наполните доверху водой.", "Накройте стакан пластиковой карточкой, придерживая её, переверните стакан — отпустите руку, карточка «прилипнет», удерживаемая водой.", "Поставьте стакан обратно на тарелку, сдвиньте карточку так, чтобы половина закрывала стакан, а половина была в воздухе (если появился воздух — долейте воды).", "Положите монеты на висящую в воздухе часть карточки и посмотрите, сколько монет она выдержит."], "principle": "Когда стакан полностью заполнен водой и накрыт карточкой, между ними почти нет воздуха. Наружное атмосферное давление прижимает карточку к стакану, поэтому вода не выливается, а положенные монеты не переворачивают карточку. По такому же принципу работают бытовые присоски-крючки.", "video": ""}, "77": {"id": 77, "title": "Волшебный пакет с водой", "materials": "Самим подготовить: пакет с застёжкой (плотный полиэтиленовый пакет), вода, карандаш.", "steps": ["Налейте в пакет немного воды и плотно завяжите (застегните) его.", "Вращательным движением проткните пакет заточенным карандашом — пакет не потечёт!"], "principle": "Поверхность карандаша ровная и гладкая, а пакет — эластичный материал. Когда карандаш прокалывает пакет, эластичный материал плотно обхватывает карандаш по контуру прокола, поэтому пакет остаётся герметичным и вода не выливается.", "video": ""}, "68": {"id": 68, "title": "Водопад из стакана", "materials": "Прозрачный стеклянный стакан, палочка для еды, резинка, самим подготовить: лист A4, зажигалка, ножницы.", "steps": ["Сверните лист A4 вокруг палочки в трубочку и закрепите резинкой (с помощью взрослых).", "Выньте палочку, закрепите бумажную трубочку под углом 45° на краю стакана так, чтобы воздух мог свободно проходить внутрь.", "Подожгите верхний конец трубочки и внимательно наблюдайте.", "По мере тления трубочки густой белый дым стекает по ней в стакан, словно струится водопад."], "principle": "Когда бумажная трубочка тлеет, температура внутри неё повышается, а давление падает. Наружное атмосферное давление продавливает дым вниз, в стакан, — так и получается эффектный «дымовой водопад».", "video": ""}, "97": {"id": 97, "title": "Вращающаяся бутылка-юла", "materials": "Воронка, самим подготовить: булавка, квадратная бутылка с крышкой, хлопковая нить, ножницы, зубочистка.", "steps": ["Проделайте ножницами небольшое отверстие в центре крышки, отрежьте кусочек зубочистки чуть короче диаметра крышки.", "Привяжите нить к середине зубочистки, проденьте её через отверстие в крышке, чтобы подвесить бутылку.", "В нижнем правом углу каждой стороны бутылки на одном уровне проколите булавкой по маленькому отверстию, капните несколько капель красителя, залейте воду доверху и быстро плотно закрутите крышку.", "Возьмитесь за нить и приподнимите бутылку — она начнёт вращаться в сторону, противоположную направлению вытекающей воды."], "principle": "Поскольку все отверстия смещены в одну сторону, вытекающая вода создаёт реактивную отдачу, которая заставляет бутылку вращаться.", "video": ""}, "149": {"id": 149, "title": "«Слипшиеся» стаканы", "materials": "Мерный стакан, самим подготовить: бумажная салфетка, вода.", "steps": ["Переверните один стакан вверх дном, поставьте на него второй перевёрнутый стакан, надавите вниз и приподнимите — ничего не происходит.", "Положите бумажную салфетку на перевёрнутый стакан, капните немного воды, поставьте сверху второй стакан и надавите — стаканы «склеятся» друг с другом."], "principle": "Когда донышки соприкасаются напрямую, из-за микроскопических неровностей между ними остаются зазоры с воздухом, и стаканы не слипаются. Смоченная салфетка заполняет эти зазоры, не пропуская воздух, и атмосферное давление заставляет стаканы «прилипнуть» друг к другу.", "video": ""}, "252": {"id": 252, "title": "Вода связывает на расстоянии", "materials": "2 мерных стакана, палочка для перемешивания, пищевой краситель, самим подготовить: двусторонний скотч, хлопковая верёвка, вода, таз.", "steps": ["Внутри одного мерного стакана двусторонним скотчем надёжно закрепите конец верёвки.", "Таким же способом закрепите другой конец верёвки во втором стакане. Поставьте оба стакана в таз.", "В один из стаканов налейте 50 мл воды, капните 3 капли красителя и перемешайте, смочите верёвку внутри стакана.", "Приподнимите один стакан и медленно наклоните его так, чтобы вода стекала вдоль верёвки во второй стакан."], "principle": "Вода смачивает верёвку и просачивается внутрь её волокон. Когда вода достигает верёвки, сила тяжести заставляет её стекать вдоль неё. Попробуйте — сможет ли стеклянная палочка так же «проводить» воду?", "video": ""}, "222": {"id": 222, "title": "Плавающий лист", "materials": "Мерный стакан, пипетка, самим подготовить: таз с водой, чернила, лист дерева, вода.", "steps": ["Налейте в таз чистую воду, капните чернила на хвостик листа.", "Опустите лист в воду — он «выстрелит» вперёд."], "principle": "Чернила при попадании в воду быстро распространяются; когда чернила на листе начинают растекаться в воде, возникает небольшая реактивная сила, которая приводит лист в движение.", "video": ""}, "6": {"id": 6, "title": "Свеча, впитывающая воду", "materials": "Пищевой краситель, мерный стакан, свеча, самим подготовить: тарелка, вода.", "steps": ["Налейте в тарелку воду (чтобы покрыть дно), добавьте 3 капли красителя и перемешайте.", "Поставьте свечу в центр тарелки, зажгите её и накройте перевёрнутым стаканом — через некоторое время вода «втянется» внутрь стакана."], "principle": "Когда стакан накрывает горящую свечу, воздух внутри нагревается и расширяется. Через несколько секунд кислород заканчивается, свеча гаснет, температура падает, воздух сжимается, а давление внутри снижается; растворяющийся в воде углекислый газ также снижает давление. В результате атмосферное давление снаружи вжимает воду внутрь стакана.", "video": ""}, "102": {"id": 102, "title": "Какая свеча погаснет первой", "materials": "2 свечи, мерный стакан, самим подготовить: двусторонний скотч, зажигалка, 4 крышки от бутылок.", "steps": ["Зажгите обе свечи и накройте каждую мерным стаканом — понаблюдайте, как оба пламени гаснут одновременно.", "Сложите стопкой 4 крышки от бутылок.", "Поставьте одну свечу на стопку крышек, а другую — прямо на стол, зажгите обе одновременно.", "Одновременно накройте обе свечи стаканами — свеча, что повыше, погаснет первой."], "principle": "При горении свечи образуется углекислый газ. Он обычно тяжелее воздуха, но в момент образования горячий, поэтому имеет меньшую плотность, и заполняет стакан сверху вниз — из-за этого свеча, расположенная выше, гаснет первой. Именно поэтому при пожаре советуют выбираться из комнаты, пригнувшись как можно ниже к полу.", "video": ""}, "107": {"id": 107, "title": "Свеча, горящая под водой", "materials": "Свеча, самим подготовить: таз (лучше прозрачный), стеклянный стакан, зажигалка, вода.", "steps": ["Налейте в таз воду почти доверху.", "Зажигалкой зажгите круглую свечу.", "Поставьте горящую свечу в центр водной поверхности.", "Накройте свечу перевёрнутым стеклянным стаканом и равномерно опускайте его вниз, наблюдая за происходящим."], "principle": "Стакан заполнен обычным воздухом. Когда он касается воды, образуется замкнутый объём: воздух вытесняет воду, уровень жидкости внутри стакана опускается, а свеча «тонет» вместе с воздушным карманом и продолжает гореть за счёт оставшегося кислорода. Поскольку воздух занимает объём, уровень воды в тазу немного поднимается.", "video": ""}, "36": {"id": 36, "title": "Стакан поднимает тарелку", "materials": "Мерный стакан, свеча, самим подготовить: салфетка, зажигалка, маленькая тарелка, вода.", "steps": ["Расстелите салфетку по центру тарелки, слегка смочите водой и разгладьте.", "Поставьте свечу на салфетку и зажгите её.", "Накройте свечу перевёрнутым мерным стаканом, плотно прижав его к тарелке.", "Через полминуты после того, как свеча погаснет, приподнимите стакан — тарелка поднимется вместе с ним!"], "principle": "Свеча сжигает кислород внутри стакана, из-за чего температура там выше, чем снаружи. Когда воздух остывает, он сжимается — давление внутри становится ниже атмосферного, и стакан «присасывается» к тарелке (тепловое расширение и сжатие).", "video": ""}, "38": {"id": 38, "title": "Банка-акробат", "materials": "Самим подготовить: банка газировки, вода.", "steps": ["Попробуйте поставить полную банку газировки наклонно на стол — она не удержится.", "Вылейте всю газировку и попробуйте поставить пустую банку наклонно — она тоже не удержится.", "Налейте в пустую банку примерно четверть банки воды.", "Снова попробуйте поставить банку наклонно — на этот раз она устойчиво замрёт в наклонном положении."], "principle": "У полной и у пустой банки центр тяжести расположен высоко и не совпадает с точкой опоры. После добавления четверти воды центр тяжести опускается и оказывается на одной вертикали с точкой опоры — поэтому банка легко удерживается наклонно. Секрет устойчивости любого предмета — совпадение центра тяжести с точкой опоры по вертикали.", "video": ""}, "117": {"id": 117, "title": "Бегущая банка", "materials": "Шарик, самим подготовить: полотенце/шерстяная вещь, банка.", "steps": ["Поставьте банку на ровный стол.", "Надуйте шарик и поднесите его близко к банке — банка не реагирует.", "Потрите верхнюю часть шарика полотенцем несколько раз (подойдут волосы или шерстяная одежда).", "Снова поднесите шарик к банке и медленно отодвигайте его — банка покатится следом."], "principle": "После трения шарик приобретает электростатический заряд, и когда он приближается к банке, наведённый заряд создаёт силу притяжения, заставляя пустую банку катиться вслед за шариком.", "video": ""}, "120": {"id": 120, "title": "Банка, которая «худеет»", "materials": "Самим подготовить: пустая банка, кипяток, холодная вода, таз, кухонное полотенце.", "steps": ["Налейте в пустую банку кипяток почти доверху.", "Примерно через 10 секунд, обернув банку полотенцем, вылейте кипяток обратно.", "Быстро переверните банку горлышком вниз в таз с холодной водой (ещё эффектнее — с ледяной) — банка сомнётся."], "principle": "Пар от кипятка вытесняет часть воздуха из банки, а оставшийся воздух нагревается. При охлаждении пар конденсируется, горячий воздух сжимается, а поскольку горлышко герметично закрыто водой, давление внутри падает. Разница между внешним и внутренним давлением сминает банку.", "video": ""}, "257": {"id": 257, "title": "Поднимающийся стаканчик", "materials": "Трубочка, самим подготовить: булавка, мелкий камешек, хлопковая нить, пластилин, ножницы, бумажный стаканчик.", "steps": ["Булавкой проколите отверстие в дне стаканчика и ещё одно у края. Проденьте нить в оба отверстия и завяжите узел.", "Отрежьте короткий кусок трубочки, проденьте через неё нить, привяжите камешек, затем положите в стаканчик пластилин.", "Держа трубочку в правой руке, раскрутите конструкцию по кругу и понаблюдайте за результатом."], "principle": "Когда трубочку раскручивают в одном направлении, камешек начинает двигаться по кругу вокруг трубочки и удаляется от неё — сила, действующая на камешек, называется центробежной силой (это фиктивная сила, разновидность силы инерции). Чтобы поддерживать это круговое движение, нужна внешняя сила, обеспечивающая центростремительную силу, — в этом опыте её роль играет вес стаканчика с пластилином. Когда центростремительная сила становится меньше центробежной, стаканчик приподнимается вверх.", "video": ""}, "272": {"id": 272, "title": "Стаканчик превращается в динамик", "materials": "Самим подготовить: 2 бумажных стаканчика, двусторонний скотч, лист A4, ножницы.", "steps": ["Сверните бумагу в трубку диаметром меньше стаканчика и склейте двусторонним скотчем. Прорежьте в середине трубки прямоугольное отверстие, чтобы туда точно вставлялся вертикально телефон.", "У одного стаканчика сбоку у самого дна прорежьте круглое отверстие — трубка должна плотно входить в него.", "У второго стаканчика сделайте такое же отверстие и вставьте другой конец трубки.", "Включите на телефоне музыку и вставьте его в трубку — звук станет заметно громче."], "principle": "Звук концентрируется: звуковые волны, которые обычно расходятся во все стороны, принудительно преломляются в одном направлении, усиливая звук в эту сторону, но ослабляя его в остальных. Форма рупора отражает часть рассеивающихся звуковых волн обратно, складывая амплитуды волн и делая звук громче.", "video": ""}, "186": {"id": 186, "title": "Дышащая бутылка", "materials": "Самим подготовить: стеклянная бутылка, монета, вода, холодильник.", "steps": ["Поставьте пустую бутылку в морозильную камеру на 5–10 минут, тем временем смочите монету водой целиком.", "Достаньте бутылку, смочите край горлышка и положите на него мокрую монету, стараясь не оставить зазора между горлышком и монетой.", "Через 30–40 секунд монета приподнимется над горлышком, а затем быстро опустится обратно, словно совершая небольшой прыжок, и так повторится несколько раз."], "principle": "Внутри бутылки находится воздух, молекулы которого постоянно движутся, то притягиваясь, то удаляясь друг от друга. При охлаждении воздуха молекулы сближаются и занимают меньше места, а при нагревании — удаляются друг от друга и занимают больше пространства, приподнимая монету.", "video": ""}, "89": {"id": 89, "title": "Птица-балансир", "materials": "Самим подготовить: белая бумага, ножницы.", "steps": ["Сложите лист бумаги в квадрат (по образцу), один угол загните внутрь, потом в обратную сторону, и ещё дважды сложите по этим линиям сгиба.", "Вырежьте получившуюся форму по контуру и сложите острые уголки по бокам, как показано на образце.", "Продолжайте складывать по шагам образца до готовой фигурки птицы."], "principle": "Птица-балансир держит равновесие благодаря особому способу складывания, при котором центр тяжести всей фигурки смещается к клюву — фактический центр тяжести оказывается ниже кончика клюва.", "video": ""}, "112": {"id": 112, "title": "Баланс монеты на ребре", "materials": "Самим подготовить: лист A4, монета 1 юань.", "steps": ["Поставьте монету на край вертикально стоящего листка бумаги.", "Сложите листок пополам.", "Раскройте сложенный листок под углом 90° и положите монету на край сгиба.", "Медленно растягивайте лист, пока он не превратится в прямую линию."], "principle": "Пока лист постепенно растягивается, между ним и монетой возникает трение, из-за которого центр тяжести монеты постепенно смещается, сохраняя равновесие. Когда лист вытягивается в прямую линию, центр тяжести монеты оказывается на этой линии — поэтому она не падает.", "video": ""}, "95": {"id": 95, "title": "Палочки стоят по стойке «смирно»", "materials": "Пипетка, мерный стакан, самим подготовить: 3 палочки для еды, вода.", "steps": ["Составьте три палочки квадратными концами вместе, как иероглиф «品».", "Капните несколько капель воды в место соединения палочек и поставьте их на ровную поверхность.", "Медленно выравнивайте палочки, пока они не встанут строго вертикально.", "Медленно отпустите руки — палочки будут стоять сами! Их можно перевернуть, и они всё равно будут стоять."], "principle": "У воды есть свойство сцепления: мокрые палочки «взбирается» друг к другу по капиллярному эффекту и словно склеиваются водой. Соединённые концы образуют достаточно широкую опору, и палочки естественным образом сохраняют вертикальное положение.", "video": ""}, "41": {"id": 41, "title": "«Удар через гору» с монетами", "materials": "Самим подготовить: линейка, несколько монет.", "steps": ["Положите две монеты рядом друг с другом у стены на столе, прижмите их линейкой между стеной и линейкой.", "Возьмите ещё одну монету, положите на небольшом расстоянии и щёлкните по ней так, чтобы она ударила по средним монетам (рассчитайте силу так, чтобы монеты не разлетелись) — понаблюдайте, что произойдёт с крайней монетой. Попробуйте добавить больше монет и одновременно ударить двумя — сколько монет вылетит с другого конца?"], "principle": "Опыт демонстрирует передачу энергии движения между телами: сколько монет вы толкнули вперёд, столько же энергии передастся дальше, и с противоположного конца «вылетит» такое же количество монет.", "video": ""}, "62": {"id": 62, "title": "«Полёт по стенам»", "materials": "Шарик, самим подготовить: монета.", "steps": ["Возьмите шарик, положите внутрь монету и надуйте его.", "Зажмите горлышко и слегка покрутите шарик — монета начнёт «летать» по кругу вдоль внутренней стенки, словно по стене."], "principle": "Монета вращается внутри шарика под действием центростремительной силы — эта сила непрерывно меняет направление вслед за движением тела по круговой траектории, поэтому монета движется по кругу вдоль стенки, не падая вниз.", "video": ""}, "224": {"id": 224, "title": "Строим мост из палочек", "materials": "3 мерных стакана, самим подготовить: 3 палочки для еды, груз.", "steps": ["Переплетите палочки крест-накрест и поставьте три их «ножки» на три стакана.", "Положите груз на получившийся «мост»."], "principle": "За счёт трения, возникающего при сжатии, палочки прижимаются друг к другу всё сильнее. Если найти правильный способ переплетения и взаимного прижатия палочек, «мост» устоит.", "video": ""}, "139": {"id": 139, "title": "Волшебный бумажный мост", "materials": "Мерный стакан, самим подготовить: лист A4, вода.", "steps": ["Поставьте рядом два мерных стакана и положите на них плашмя лист бумаги; третий стакан по центру листа провалится вниз.", "Сложите бумагу гармошкой, поочерёдно в разные стороны.", "Положите сложенный лист на два стакана — получился бумажный мост. Наполните третий стакан водой и поставьте на мост — он будет стоять уверенно."], "principle": "Складывание превратило один лист во множество связанных «стенок». Вес наполненного стакана равномерно распределяется по ним, поэтому мост не проваливается.", "video": ""}, "251": {"id": 251, "title": "«Заморозка» ключа", "materials": "Самим подготовить: палочки для еды, хлопковая нить, ключ.", "steps": ["Привяжите один конец нити к ключу, другой — к палочке.", "Держите палочку вертикально, а затем постепенно наклоняйте её. Что вы заметили?"], "principle": "Сила, с которой Земля притягивает ключ, называется силой тяжести. Направление силы тяжести всегда строго вертикально вниз. Поэтому, как бы вы ни наклоняли палочку, ключ словно «застывает» и всегда указывает строго вниз. И то, что вода течёт вниз, и то, что яблоко падает на землю, — всё это результат действия силы тяжести Земли.", "video": ""}, "110": {"id": 110, "title": "Трубочка притягивает бумажные кусочки", "materials": "Трубочка, самим подготовить: бумажная салфетка, шерстяная вещь.", "steps": ["Оторвите кусочек салфетки, мелко нарвите на бумажные кусочки и рассыпьте по столу.", "Потрите трубочку о шерстяную вещь туда-сюда примерно 20 раз, затем поднесите её близко к бумажным кусочкам и понаблюдайте."], "principle": "При трении о шерсть трубочка приобретает дополнительный отрицательный заряд. В незаряженных бумажных кусочках рядом с ней наводится заряд противоположного знака, и, поскольку разноимённые заряды притягиваются, возникает эффект «электростатического притяжения».", "video": ""}, "246": {"id": 246, "title": "Наэлектризованная бумага", "materials": "Самим подготовить: карандаш, газета/лист A4.", "steps": ["Разверните газету и разложите её на стене.", "Быстро потрите газету боковой стороной карандаша несколько раз — газета словно приклеится к стене и не будет падать.", "Приподнимите уголок газеты и отпустите — приподнятый уголок притянется обратно к стене.", "Медленно снимайте газету со стены, прислушиваясь к звуку статического электричества."], "principle": "Трение карандашом заряжает газету статическим электричеством, и наэлектризованная газета притягивается к стене. Когда воздух в помещении сухой (особенно зимой), при отклеивании газеты от стены можно услышать характерное потрескивание статического разряда.", "video": ""}, "111": {"id": 111, "title": "Стилус для телефона своими руками", "materials": "Палочка для перемешивания, мерный стакан, самим подготовить: двусторонний скотч, бумажная салфетка, сенсорный телефон, вода.", "steps": ["Коснитесь экрана телефона палочкой для перемешивания — проверьте, реагирует ли экран.", "Оберните половину палочки бумажной салфеткой и закрепите край двусторонним скотчем.", "Налейте воду в мерный стакан и намочите салфетку (не сильно, достаточно, чтобы промокла).", "Держась за влажную часть, снова коснитесь экрана — телефон «послушается»! Можно даже писать."], "principle": "Экран реагирует не именно на палец, а на то, что палец проводит электричество — его касание меняет ёмкость под экраном в этом месте. Сухая палочка электричество не проводит, а обёрнутая мокрой салфеткой становится проводящей. По той же причине нельзя вставлять мокрую вилку в розетку — соблюдайте технику безопасности при обращении с электричеством!", "video": ""}, "288": {"id": 288, "title": "Волшебная трубочка", "materials": "2 трубочки, самим подготовить: бутылка, кусочки бумаги, шерстяная ткань/волосы/другая шерстяная вещь.", "steps": ["Потрите одну трубочку об одежду или волосы примерно 20 раз.", "Поднесите наэлектризованную трубочку к кусочкам бумаги — они притянутся к ней.", "Положите наэлектризованную трубочку на горлышко бутылки, поднесите к ней вторую, ненаэлектризованную трубочку — первая начнёт вращаться вслед за ней."], "principle": "Когда трубочку трут о шерстяную ткань, на ней накапливается дополнительный отрицательный заряд. Когда незаряженная трубочка приближается к наэлектризованной, на ней наводится заряд противоположного знака — по принципу «разноимённые заряды притягиваются» возникает явление электростатического притяжения.", "video": ""}, "266": {"id": 266, "title": "Пакет, прилипший к стене", "materials": "Самим подготовить: бумажная салфетка, полиэтиленовый пакет для мусора.", "steps": ["Приставьте пакет к стене — он соскальзывает вниз и не держится.", "Потрите пакет салфеткой в одном направлении десяток раз.", "Снова приставьте пакет к стене — теперь он прочно держится на поверхности."], "principle": "Сам по себе пакет не заряжен, но при трении о салфетку он приобретает статический заряд. Наэлектризованный пакет притягивается к стене и держится на ней. Когда заряд постепенно рассеивается, пакет снова медленно соскальзывает вниз.", "video": ""}, "48": {"id": 48, "title": "Мелодичная флейта Пана", "materials": "2 трубочки, двусторонний скотч, самим подготовить: плотная бумага/картон, ножницы, линейка.", "steps": ["Отмерьте и отрежьте первый отрезок трубочки длиной 2,5 см, каждый следующий делайте длиннее на 0,5 см — всего 8 отрезков.", "Скотчем крест-накрест плотно заклейте один конец каждой трубочки.", "Вырежьте из картона две заготовки в форме флейты Пана. Разложите трубочки от самой длинной к самой короткой с шагом 0,5 см и приклейте (незаклеенные концы — на одном уровне).", "Прижмите трубочки второй картонкой сверху. Украсьте рисунком и нотами — и можно исполнять мелодию!"], "principle": "Поток воздуха скользит над отверстием и ударяется о внутреннюю стенку трубочки, заставляя воздух внутри колебаться и создавать звук. Трубочки от длинной к короткой дают звукоряд до-ре-ми-фа-соль-ля-си-до.", "video": ""}, "72": {"id": 72, "title": "Увидеть звук", "materials": "Шарик, самим подготовить: соль, небольшая колонка, ножницы.", "steps": ["Отрежьте у шарика горлышко и натяните его на колонку.", "Насыпьте немного соли в центр получившейся мембраны.", "Подключите колонку к источнику питания и включите ритмичную музыку с телефона или компьютера.", "Понаблюдайте — соль будет «танцевать» в такт музыке."], "principle": "Звук порождается колебаниями. Когда играет музыка, воздух вибрирует, а вместе с ним колеблется мембрана и соль на ней — так мы видим «след» звуковой волны. Чем выше частота звука, тем выше тон, и тем сильнее амплитуда колебаний — поэтому на самых громких и высоких нотах соль подпрыгивает особенно сильно.", "video": ""}, "216": {"id": 216, "title": "Забавный «жучок»", "materials": "Шарик, резинка, мерный стакан, самим подготовить: ножницы.", "steps": ["Разрежьте шарик и уберите узкую горловину.", "Натяните получившуюся плёнку на мерный стакан и закрепите резинкой.", "Прижмите сторону с плёнкой к двери, а ухо приложите к донышку стакана — так можно услышать, что происходит за дверью."], "principle": "Опыт основан на принципе передачи звука через колебания твёрдого тела: когда источник звука за стеной колеблется, резиновая плёнка улавливает эти колебания. Форма стакана эффективно фокусирует звук и уменьшает его рассеивание, поэтому звук из соседней комнаты становится слышен. Опыт предназначен только для научного исследования — не используйте его, чтобы подслушивать чужие разговоры.", "video": ""}, "144": {"id": 144, "title": "Бумажная хлопушка", "materials": "Самим подготовить: бумага.", "steps": ["Сложите лист A4 втрое (по ширине примерно на 1/6) три раза.", "Сложите бумагу ещё раз в другом направлении.", "Сделайте хлопушку по образцу.", "Возьмитесь за нижний угол и резко взмахните рукой — раздастся громкий хлопок «БУМ»!"], "principle": "Звук возникает от колебаний, распространяющихся через воздух. Когда бумага резко раскрывается, вибрация мгновенно колеблет воздух — так и получается громкий звук.", "video": ""}, "56": {"id": 56, "title": "Лупа из капли воды", "materials": "Мерный стакан, пипетка, самим подготовить: двусторонний скотч, плотный картон, ножницы, прозрачная плёнка.", "steps": ["Вырежьте из картона заготовку в форме лупы, а в месте «линзы» — круглое отверстие диаметром 3 см.", "Вырежьте кусочек прозрачной плёнки по размеру рамки и плотно приклейте двусторонним скотчем.", "Налейте воду в мерный стакан, пипеткой капните 3 капли воды на плёнку.", "Наведите получившуюся «лупу» на текст или картинку и посмотрите сквозь каплю — буквы увеличатся."], "principle": "Капля воды — прозрачная оптическая среда: из-за поверхностного натяжения в воздухе она принимает форму эллипсоида, а её изогнутая поверхность работает как естественная линза, увеличивающая изображение.", "video": ""}, "35": {"id": 35, "title": "Подводный мир", "materials": "Самим подготовить: прозрачная пластиковая бутылка, газировка (типа Sprite), изюм.", "steps": ["Налейте в прозрачную бутылку газировку почти доверху.", "Придерживая бутылку одной рукой, слегка постучите по стенке дру
