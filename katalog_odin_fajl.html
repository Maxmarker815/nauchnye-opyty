гой, чтобы стряхнуть пузырьки со стенок.", "Бросьте в бутылку около 10 изюминок — они начнут «плавать», словно рыбки, то поднимаясь, то опускаясь."], "principle": "Газированный напиток содержит много углекислого газа. Часть пузырьков прилипает к изюминкам, и выталкивающая сила становится больше их веса — они всплывают. Когда пузырьки лопаются, изюминки снова опускаются. Так повторяется снова и снова, создавая эффект маленького аквариума.", "video": ""}, "161": {"id": 161, "title": "Глаза могут обманывать", "materials": "Самим подготовить: ножницы, циркуль, бумага.", "steps": ["Циркулем нарисуйте на бумаге дугу окружности, тем же центром нарисуйте дугу поменьше.", "Сложите белый лист пополам и ножницами вырежьте две одинаковые по размеру дуги.", "Отметьте карандашом обе дуги для сравнения.", "Разместите обе дуги в разных положениях и понаблюдайте за их размером.", "Дуга, что ближе к нам, кажется больше, а та, что дальше — меньше."], "principle": "Это зрительная иллюзия — оптический обман, когда результат наблюдения заметно отличается от реального положения дел. В этом опыте нижняя дуга кажется длиннее верхней, хотя на самом деле они одинаковой длины — наш мозг обманут собственными глазами.", "video": ""}, "172": {"id": 172, "title": "Лестница-иллюзия", "materials": "Самим подготовить: лист A4, карандаш, ручка/чёрная гелевая ручка, линейка.", "steps": ["Сложите лист A4 пополам.", "Проведите вертикально две параллельные линии длиной 20 см на расстоянии 3 см друг от друга, следя, чтобы линии были строго перпендикулярны линии сгиба.", "Соедините обе линии поперечными вертикальными отрезками с шагом 2 см, перпендикулярными обеим параллельным линиям.", "Отметьте точки на расстоянии 1,5 см и 4,5 см от нижней параллельной линии, соедините их с концами обеих параллельных линий, затем соедините вертикальными линиями и обведите чёрной ручкой, чтобы утолстить линии.", "Сложите лист по линии сгиба так, чтобы обе половины оказались перпендикулярны друг другу, найдите подходящий угол зрения и понаблюдайте, что произошло с рисунком."], "principle": "Линии, изначально нарисованные на плоскости, после складывания и правильного выбора точки обзора превращаются в объёмную лестницу, словно прислонённую к листу. Принцип трёхмерного рисунка основан на обратном применении перспективы: изображение проецируется на поверхность в обратном порядке через определённую точку обзора по законам зрительного восприятия.", "video": ""}, "145": {"id": 145, "title": "Оптическая подмена", "materials": "Самим подготовить: линейка, картон, ножницы, карандаш.", "steps": ["Вырежьте прямоугольник картона размером 10×8 см, разделите каждую сторону на 5 равных частей и начертите сетку из 25 квадратов.", "Отметьте центр второго квадрата и проведите диагональную линию, как показано на образце.", "Разрежьте картон по образцу на 5 частей.", "Уберите самый маленький квадратик, а оставшиеся 4 части сложите по-новому — снова получится прямоугольник."], "principle": "Оставшиеся 4 части благодаря геометрической хитрости складываются в прямоугольник, но его площадь отличается от исходного — новый прямоугольник чуть короче, и эта разница как раз равна площади убранного квадратика. Хотя фигуры выглядят одинаково, площадь уже меньше.", "video": ""}, "215": {"id": 215, "title": "Отражение в воде", "materials": "Самим подготовить: вода, картинка на бумаге.", "steps": ["Налейте воду на гладкую поверхность стола.", "Поднесите картинку близко к поверхности воды — на воде появится отражение картинки."], "principle": "Когда свет падает на границу раздела двух сред, часть его возвращается обратно в исходную среду, меняя направление распространения, — это называется отражением света. В этом опыте свет из воздуха попадает на поверхность воды и отражается, создавая отражение картинки.", "video": ""}, "293": {"id": 293, "title": "Очки, которые не запотевают", "materials": "Защитные очки/обычные очки, самим подготовить: средство для мытья посуды, горячая вода.", "steps": ["Налейте в мерный стакан горячую воду, поднесите стекло очков близко к пару — оно тут же запотеет.", "Нанесите средство для мытья посуды на стекло и протрите насухо салфеткой.", "Снова поднесите очки к пару — обработанное моющим средством стекло больше не запотевает."], "principle": "Запотевание — это конденсация водяного пара на стекле в виде мельчайших капель. Средство для мытья посуды — поверхностно-активное вещество: после протирания им поверхностное натяжение капель нарушается, поэтому отдельные капли не образуются, и туманной плёнки не возникает.", "video": ""}, "164": {"id": 164, "title": "Копирование отпечатка пальца", "materials": "Самим подготовить: двусторонний скотч, ножницы, белая бумага, карандаш.", "steps": ["Карандашом закрасьте на бумаге большое тёмное пятно, отрежьте кусочек двустороннего скотча и приклейте на другой лист бумаги.", "Прижмите палец к тёмному пятну, а затем прижмите этот же палец к скотчу — почему отпечаток пальца отчётливо отпечатывается на бумаге?", "Попробуйте с творческим подходом снять отпечатки пальцев разных людей и сравните, отличаются ли они друг от друга."], "principle": "Грифель карандаша состоит из графита и глины в соотношении 2:1, графит содержит углерод. Когда вы водите карандашом по бумаге, вы стираете грифель в порошок, который прилипает к пальцу и окрашивает мельчайшие бороздки отпечатка в чёрный цвет. Прижав палец к скотчу, вы переносите отпечаток на него — отпечаток пальца у каждого человека уникален.", "video": ""}, "108": {"id": 108, "title": "«Лишняя» бумага", "materials": "Самим подготовить: линейка, белая бумага, карандаш.", "steps": ["Сделайте метку на одной стороне листа через каждую треть.", "На другой стороне листа сделайте одну метку посередине.", "Сложите лист пополам по длинным сторонам, затем разверните и разгладьте.", "Из каждой метки проведите линию, перпендикулярную линии сгиба.", "Разрежьте по этим трём линиям, затем переверните половину листа — и лист словно «умножился»!"], "principle": "Опыт основан на логической иллюзии и обмане зрения. Бумаги на самом деле не прибавилось — переворачивание средней части заставляет её приподняться, создавая у глаз впечатление лишнего куска.", "video": ""}, "163": {"id": 163, "title": "Один разрез — восемь частей бумаги", "materials": "Самим подготовить: белая бумага, цветные фломастеры, ножницы.", "steps": ["С помощью линейки вырежьте из белого листа прямоугольник 8×16 см.", "Линейкой или последовательным складыванием пополам разделите лист на 8 равных квадратов, фломастером закрасьте 2-й, 4-й, 5-й и 7-й квадраты.", "Сложите лист пополам по линии между вторым столбцом квадратов, переверните и сложите гармошкой, затем сложите оба угла в треугольник и продолжайте складывать по средней линии — получится треугольник, наполовину цветной, наполовину белый.", "Разрежьте по средней линии треугольника. Разверните — получите 8 квадратов."], "principle": "Вырезанный нами прямоугольник — осесимметричная фигура: если сложить плоскую фигуру по прямой линии, части по обе стороны от линии полностью совпадут. После нескольких сложений граница между цветными и белыми квадратами оказывается на одной прямой линии — оси симметрии, поэтому достаточно разрезать точно по этой линии, чтобы разделить все квадраты.", "video": ""}, "155": {"id": 155, "title": "Волшебная бумажная полоска", "materials": "Мерный стакан, пищевой краситель, самим подготовить: бумажная салфетка.", "steps": ["Капните 4 разных цвета красителя у основания салфетки.", "Наполните стакан водой доверху.", "Опустите салфетку в стакан — краситель будет подниматься вверх по салфетке."], "principle": "Когда сила сцепления между жидкостью и волокнами салфетки больше внутреннего сцепления самой жидкости, возникает капиллярный эффект, и жидкость поднимается вверх.", "video": ""}, "90": {"id": 90, "title": "Лента Мёбиуса", "materials": "Самим подготовить: большие ножницы, двусторонний/прозрачный скотч, белая бумага.", "steps": ["Вырежьте из листа A4 три одинаковые длинные полоски.", "Первую полоску соедините концами обычным образом (без перекручивания) и разрежьте по центральной линии — получится две отдельные полоски.", "Вторую полоску перекрутите на 180° и склейте концы, затем разрежьте по центральной линии — получится одно большое кольцо.", "Третью полоску перекрутите на 360° и склейте концы, затем разрежьте по центральной линии — получится два сцепленных между собой кольца."], "principle": "Это лента Мёбиуса: в 1858 году математики Мёбиус и Листинг обнаружили, что полоска, перекрученная на 180° и склеенная концами, имеет только одну сторону (в отличие от обычной полоски с двумя сторонами), поэтому при разрезании по центру получается не два кольца, а одно длинное перекрученное. А лента, перекрученная на 360°, при разрезании даёт два сцепленных друг с другом кольца.", "video": ""}, "142": {"id": 142, "title": "Вращающийся кусочек бумаги", "materials": "Самим подготовить: ножницы, бумага.", "steps": ["Сложите лист бумаги пополам по центральной линии дважды, разверните и разрежьте по линиям сгиба на 4 части.", "Сложите один край в маленький треугольник, повторите складывание, надрежьте немного внутрь по сгибу; продолжайте складывать, разрежьте другой край посередине — вращающийся кусочек бумаги готов."], "principle": "Когда кусочек бумаги падает под действием силы тяжести, вокруг него возникает поток воздуха. Проходя через две наклонённые изогнутые поверхности, воздух заставляет бумагу вращаться.", "video": ""}, "195": {"id": 195, "title": "Гонка гусениц", "materials": "Трубочка, самим подготовить: фломастеры, ножницы, бумага.", "steps": ["Отрежьте одну шестую часть листа A4 и сложите её втрое.", "Разрежьте три из получившихся сегментов, а из оставшихся пяти сделайте фигурку «гусеницы».", "Направьте трубочку на середину «гусеницы» и дуйте прерывисто, с паузами.", "Раскрасьте «гусеницу» в яркие цвета для красоты."], "principle": "Когда мы прерывисто дуем на заднюю часть тела «гусеницы», её тело вытягивается вперёд; благодаря упругости бумаги оно возвращается в исходное положение, и хвостовая часть подтягивается вперёд — повторяя эти движения, гусеница «ползёт» вперёд.", "video": ""}, "105": {"id": 105, "title": "Непотопляемый бумажный кораблик", "materials": "Самим подготовить: восковые мелки, лист A4, вода, таз.", "steps": ["Сложите лист A4 пополам по длинной стороне на две части, один из листов равномерно закрасьте восковым мелком (лучше с обеих сторон).", "Сложите оба листа в кораблики так, чтобы закрашенная сторона оказалась внутри — снаружи будет восковой слой.", "Наполните таз водой доверху и опустите оба кораблика в воду, подождите некоторое время.", "Кораблик без воска намокнет и постепенно утонет, а кораблик с восковым покрытием останется на плаву."], "principle": "Растительные волокна бумаги содержат множество мельчайших пор (капиллярный эффект), дающих ей впитывающую способность. Восковой слой покрывает бумагу как защитная плёнка: воск легче воды и не растворяется в ней, поэтому вощёный кораблик не пропитывается водой и не тонет.", "video": ""}, "28": {"id": 28, "title": "Самодельный термометр", "materials": "Мерный стакан, пищевой краситель, пипетка, самим подготовить: горячая вода, холодная вода.", "steps": ["В мерный стакан налейте немного воды, добавьте краситель и перемешайте, затем возьмите два стакана и налейте в них горячую и холодную воду.", "Наберите пипеткой немного окрашенного раствора (важно, чтобы жидкость осталась в верхней части пипетки), затем поочерёдно опускайте пипетку в горячую и холодную воду. Понаблюдайте, поднимается или опускается жидкость в зависимости от температуры воды — так пипетка становится простым термометром."], "principle": "Когда пипетка оказывается в горячей воде, воздух внутри неё нагревается и расширяется, выталкивая жидкость вверх. В холодной воде воздух сжимается, и жидкость опускается.", "video": ""}, "91": {"id": 91, "title": "Опыт с температурой воды", "materials": "3 мерных стакана, самим подготовить: горячая вода, тёплая вода, холодная вода.", "steps": ["Опустите по одному пальцу каждой руки в горячую и холодную воду на минуту.", "Затем опустите оба пальца в тёплую воду — что почувствует каждая рука: тепло или холод?"], "principle": "Палец, который был в холодной воде, ощущает тёплую воду как горячую, а палец из горячей воды — как холодную: руки «привыкли» к разной температуре. Наши ощущения тепла и холода часто субъективны — для точного измерения нужен термометр.", "video": ""}, "261": {"id": 261, "title": "Склеивание ледяной башни", "materials": "Мерная ложка, самим подготовить: тарелка, соль, лёд, мерная ложка.", "steps": ["Положите 3–4 кубика льда на тарелку.", "Насыпьте на один кубик десяток крупинок соли и поставьте на него сверху другой кубик.", "Снова насыпьте немного соли и поставьте следующий кубик сверху.", "Примерно через минуту аккуратно приподнимите верхний кубик — вся «ледяная башня» поднимется вместе с ним."], "principle": "Соль понижает температуру замерзания воды, из-за чего лёд рядом с ней быстрее подтаивает. Талая вода, попавшая под влияние окружающего холода, снова замерзает, надёжно скрепляя кубики льда между собой.", "video": ""}, "51": {"id": 51, "title": "Модель дыхания лёгких", "materials": "Трубочка, шарик, резинка, свеча, самим подготовить: зажигалка, ножницы, пластиковая бутылка с крышкой.", "steps": ["Ножницами проделайте в крышке круглое отверстие под размер трубочки (лучше с помощью взрослых).", "Наденьте шарик на конец трубочки внутри крышки и закрепите резинкой (неглубоко).", "Поместите шарик внутрь бутылки, плотно закрутите крышку, зажгите свечу и накапайте воск в щель между крышкой и трубочкой для герметичности.", "Сжимайте и отпускайте стенки бутылки — шарик внутри будет менять размер."], "principle": "Шарик работает как дыхательные мышцы человека: при сжатии бутылки (аналог выдоха) давление в «лёгких» растёт и воздух выталкивается наружу; при отпускании (аналог вдоха) давление падает и воздух засасывается внутрь.", "video": ""}, "64": {"id": 64, "title": "Потерянное направление", "materials": "Самим подготовить: пластиковая бутылка, бумага, цветные фломастеры, вода.", "steps": ["Напишите фломастером на бумаге разные цифры.", "Наполните бутылку чистой водой доверху и поставьте лист с рисунком вертикально примерно в 10 см позади бутылки.", "Понаблюдайте, чем изображение, видимое через бутылку, отличается от оригинала."], "principle": "Свет распространяется с разной скоростью в разных средах и на границе двух сред меняет направление — это преломление. Стакан (бутылка), полностью заполненный водой, работает как цилиндрическая выпуклая линза — на определённом расстоянии видимое изображение оказывается перевёрнутым слева направо.", "video": ""}, "93": {"id": 93, "title": "Спасение на расстоянии", "materials": "Шарик для пинг-понга, трубочка, самим подготовить: стеклянный стакан.", "steps": ["Положите шарик в стакан.", "Дуйте через трубочку прямо на шарик вблизи от него — шарик приподнимется.", "Отодвиньте трубочку немного выше, на большее расстояние от стакана.", "Снова сильно подуйте на шарик через трубочку — на этот раз шарик вылетит из стакана!"], "principle": "Согласно принципу Бернулли, чем выше скорость потока, тем ниже давление. Когда вы дуете сверху на шарик, скорость воздуха над ним увеличивается, давление там падает, а давление под шариком остаётся выше — этот перепад компенсирует вес шарика, из-за чего он приподнимается и даже вылетает из стакана.", "video": ""}, "115": {"id": 115, "title": "Управление соломинкой", "materials": "Трубочка, самим подготовить: шерстяная вещь/волосы, пластиковая бутылка с крышкой.", "steps": ["Потрите трубочку о шерсть — оба конца, примерно по 20 раз в каждую сторону.", "Положите трубочку горизонтально на закрученную бутылку с водой.", "Поднесите ладони с двух сторон от концов трубочки (на расстоянии около 5 см, не касаясь).", "Медленно двигайте руками — трубочка словно «слушается» и поворачивается вслед за ними."], "principle": "При трении о шерсть трубочка приобретает дополнительный отрицательный заряд, и в незаряженной ладони рядом с ней наводится заряд противоположного знака — разноимённые заряды притягиваются, проявляя эффект «электростатического притяжения».", "video": ""}, "247": {"id": 247, "title": "Изготовление механической руки", "materials": "3 трубочки, самим подготовить: двусторонний скотч, хлопковая верёвка (3 м), плотная карточка, ножницы.", "steps": ["Приложите ладонь к карточке, максимально растопырив пальцы, обведите и вырежьте форму ладони.", "По числу и примерной длине суставов наклейте на бумажную ладонь полоски двустороннего скотча в соответствующих местах.", "Нарежьте трубочки на нужные отрезки и приклейте их сверху; в области ладони отрезки должны быть чуть длиннее. Разделите верёвку на 5 равных частей.", "Проденьте по одной верёвке через каждый палец, закрепите конец на обратной стороне скотчем; все 5 верёвок соберите вместе и проденьте через трубочку, приклеенную к ладони и заменяющую предплечье. Потяните за верёвки — механическая рука сможет хватать предметы!"], "principle": "Когда вы тянете за верёвки, суставы приходят в движение, а сила через верёвки передаётся к каждому суставу, позволяя ему сгибаться — так имитируется хватательное движение руки. Чем сильнее натяжение верёвки, тем крепче хватка.", "video": ""}, "255": {"id": 255, "title": "Десантник с парашютом", "materials": "Пищевой краситель, самим подготовить: двусторонний скотч, хлопковая верёвка (1,5 м), плотный пакет, ножницы.", "steps": ["Вырежьте из пакета квадрат с закруглёнными краями диаметром 25 см.", "Отрежьте два куска верёвки по 50 см, сложите один угол квадрата, приклейте конец верёвки в этот угол.", "По очереди приклейте верёвки крест-накрест ко всем четырём углам.", "В месте пересечения верёвок в центре привяжите бутылочку с красителем или другой груз — парашют готов, можно подбрасывать его повыше."], "principle": "Купол парашюта увеличивает сопротивление воздуха при свободном падении, снижая скорость спуска до величины, которую человеческое тело способно выдержать. Это основано на принципе сопротивления воздуха — раскрывающийся аэродинамический замедлитель тормозит движение относительно воздуха.", "video": ""}, "290": {"id": 290, "title": "Самодельный пластилин", "materials": "Пищевой краситель, мерный стакан, самим подготовить: мука, соль, растительное масло, миска, ложка, вода.", "steps": ["Всыпьте мерный стакан муки в миску, добавьте ложку соли, немного растительного масла и немного воды, перемешайте (воду добавляйте понемногу, за несколько заходов), замесите тесто.", "Добавьте краситель по вкусу и тщательно вымесите тесто, пока оно не станет гладким, эластичным и не перестанет липнуть к рукам."], "principle": "Зачем в тесто добавляют соль и масло? Масло делает тесто не липким и повышает его пластичность, а соль замедляет потерю влаги из теста.", "video": ""}, "369": {"id": 369, "title": "Водяные шарики-эльфы", "materials": "Альгинат натрия, лактат кальция, мерный стакан, формочки, палочка для перемешивания, самим подготовить: миска, таз, кипяток, чистая вода.", "steps": ["Насыпьте в миску альгинат натрия из расчёта 3 г на 10 мл и добавьте 240 мл кипятка, перемешивайте палочкой 10 минут (можно перемешивать с перерывами). Оставьте на 5 минут, затем перемешивайте ещё 5 минут и дайте постоять около часа — получится густой раствор альгината натрия.", "Мерным стаканом отмерьте 300 мл холодной воды, вылейте в таз, добавьте 10 г лактата кальция и тщательно перемешайте — получится прозрачный раствор лактата кальция.", "Возьмите полукруглую формочку, окуните её в раствор лактата кальция, чтобы смочить, затем медленно влейте немного раствора альгината натрия в полукруглую формочку. Погрузите формочку в раствор лактата кальция на 5 секунд, затем переверните её — «водяной шарик» отделится от формочки. Подержите водяного эльфа в растворе лактата кальция ещё 5 минут, после чего его можно достать; чем дольше он вымачивается, тем более упругим становится. Если добавить в раствор альгината натрия немного красителя, получатся цветные водяные шарики."], "principle": "Альгинат натрия — безопасное и безвредное вещество, получаемое из морских водорослей. При контакте с ионами кальция из лактата кальция альгинат натрия быстро вступает в ионный обмен. Желейные конфеты-желе делаются по схожему принципу, благодаря чему получаются красивыми и вкусными.", "video": ""}, "370": {"id": 370, "title": "Волшебный песок", "materials": "Волшебный песок, мерный стакан, ложка для зачерпывания, самим подготовить: вода, тарелка, бумажные салфетки.", "steps": ["Налейте в мерный стакан больше половины чистой воды, всыпьте волшебный песок в воду и зачерпните песок ложкой — песок оказывается сухим.", "Как достать песок: сливайте воду из мерного стакана, пока песок почти не начнёт высыпаться, затем остановитесь. Возьмите тарелку, вылейте на неё оставшийся песок с водой и промокните воду из песка бумажной салфеткой — готово."], "principle": "Волшебный песок — это обычный песок, покрытый водоотталкивающей плёнкой, из-за которой молекулы воды не прилипают к поверхности песчинок. Когда песок высыпают в воду, песчинки собираются вместе и превращаются в подобие комка воска; но стоит вынуть его из воды, как песок возвращается в свой обычный вид.", "video": ""}, "285": {"id": 285, "title": "Фейерверк из масла и воды", "materials": "Пищевой краситель, пипетка, мерный стакан, самим подготовить: тарелка, пластиковая бутылка, растительное масло.", "steps": ["Поставьте бутылку по центру тарелки, налейте около 150 мл чистой воды. Пипеткой наберите 15 мл растительного масла и капните в мерный стакан, затем добавьте туда же по несколько капель каждого из трёх цветов красителя.", "Слегка покачайте стакан, чтобы капли красителя в нём стали помельче, затем вылейте смесь масла и красителя в бутылку с водой."], "principle": "Плотность красителя больше плотности воды, а плотность воды больше плотности растительного масла. Когда смесь масла и красителя выливают в воду, масло, будучи легче воды, всплывает на поверхность, а самый плотный краситель в итоге опускается на дно бутылки и растворяется в воде.", "video": ""}}};

function renderList(){
  var htmlStr='';
  DATA.groups.forEach(function(g){
    var cards='';
    g.ids.forEach(function(id){
      var it=DATA.items[id];
      cards+='<div class="card" data-search="'+esc(it.title.toLowerCase())+'" onclick="openItem('+id+')">'
        +'<h3>'+esc(it.title)+'</h3><span class="badge ok">готово</span></div>';
    });
    htmlStr+='<section class="group"><h2 class="group-title">'+esc(g.name)+' <span class="group-count">('+g.ids.length+')</span></h2><div class="grid">'+cards+'</div></section>';
  });
  htmlStr+='<p id="no-results" class="no-results" hidden>Ничего не найдено</p>';
  listContainer.innerHTML=htmlStr;
  bindSearch();
}

function openItem(id){
  var it=DATA.items[id];
  var steps='';
  it.steps.forEach(function(s){steps+='<li>'+esc(s)+'</li>';});
  var videoBlock;
  if(it.video){
    videoBlock='<div class="video-embed"><iframe src="https://www.youtube.com/embed/'+it.video+'" title="Видео опыта" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" allowfullscreen></iframe></div>';
  }else{
    videoBlock='<div class="video-placeholder">Видео добавится позже</div>';
  }
  detailContainer.innerHTML=
    '<a class="back-link" href="#" onclick="closeItem();return false;">&larr; Ко всему каталогу</a>'
    +'<h1>'+esc(it.title)+'</h1>'
    +'<div class="section-block"><h2>Видео</h2>'+videoBlock+'</div>'
    +'<div class="section-block"><h2>Материалы</h2><p>'+esc(it.materials)+'</p></div>'
    +'<div class="section-block"><h2>Шаги эксперимента</h2><ol>'+steps+'</ol></div>'
    +'<div class="section-block"><h2>Научный принцип</h2><p>'+esc(it.principle)+'</p></div>';
  listView.style.display='none';
  detailView.style.display='block';
  window.scrollTo(0,0);
}
function closeItem(){
  detailView.style.display='none';
  listView.style.display='block';
  window.scrollTo(0,0);
}

function bindSearch(){
  var input=document.getElementById('search');
  var clearBtn=document.getElementById('search-clear');
  var noRes=document.getElementById('no-results');
  function apply(){
    var q=input.value.trim().toLowerCase();
    clearBtn.style.display=q?'block':'none';
    var any=false;
    document.querySelectorAll('.card').forEach(function(c){
      var m=!q||c.getAttribute('data-search').indexOf(q)!==-1;
      c.style.display=m?'':'none'; if(m)any=true;
    });
    document.querySelectorAll('.group').forEach(function(g){
      var vis=g.querySelectorAll('.card:not([style*="display: none"])').length>0;
      g.style.display=vis?'':'none';
    });
    noRes.hidden=any;
  }
  input.addEventListener('input',apply);
  clearBtn.addEventListener('click',function(){input.value='';apply();input.focus();});
}

renderList();
</script>
</body></html>
